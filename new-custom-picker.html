<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎨 Кастомизация</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 100px;
        }
        
        .header { text-align: center; margin-bottom: 15px; padding-top: 10px; }
        .header h1 { font-size: 20px; color: #10b981; margin-bottom: 5px; }
        .element-tag {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid #10b981;
            color: #10b981;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .preview-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            text-align: center;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .preview-bg-image {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            z-index: 0;
            opacity: 0.8;
        }
        
        .preview-text {
            font-size: 24px;
            font-weight: bold;
            transition: all 0.2s;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            z-index: 1;
            position: relative;
            white-space: pre-wrap;
            word-break: break-word;
        }
        
        /* 12 АНИМАЦИЙ */
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.05); } }
        @keyframes pulse-red { 0%, 100% { color: inherit; } 50% { color: #ff4444; } }
        @keyframes pulse-gold { 0%, 100% { color: inherit; } 50% { color: #ffd700; } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        @keyframes glow { 0%, 100% { text-shadow: 0 0 5px currentColor, 0 0 10px currentColor; } 50% { text-shadow: 0 0 20px currentColor, 0 0 30px currentColor, 0 0 40px currentColor; } }
        @keyframes rainbow { 0% { color: #ff0000; } 17% { color: #ff8800; } 33% { color: #ffff00; } 50% { color: #00ff00; } 67% { color: #0000ff; } 83% { color: #ff00ff; } 100% { color: #ff0000; } }
        @keyframes typing { from { width: 0; } to { width: 100%; } }
        @keyframes slide-up { 0% { transform: translateY(100%); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        @keyframes fade { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .anim-pulse { animation: pulse 2s infinite; }
        .anim-pulse-red { animation: pulse-red 2s infinite; }
        .anim-pulse-gold { animation: pulse-gold 2s infinite; }
        .anim-bounce { animation: bounce 1s infinite; }
        .anim-shake { animation: shake 0.5s infinite; }
        .anim-glow { animation: glow 2s infinite; }
        .anim-rainbow { animation: rainbow 3s infinite; }
        .anim-typing { 
            overflow: hidden; 
            white-space: nowrap; 
            border-right: 3px solid currentColor;
            animation: typing 2s steps(20) infinite alternate; 
        }
        .anim-slide-up { animation: slide-up 0.5s ease-out; }
        .anim-scroll { animation: scroll 5s linear infinite; white-space: nowrap; display: inline-block; width: 100%; overflow: hidden; }
        .anim-fade { animation: fade 3s infinite; }
        .anim-rotate { animation: rotate 3s linear infinite; }
        
        /* Спойлеры */
        .spoiler {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            margin-bottom: 10px;
            overflow: hidden;
        }
        
        .spoiler-header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.2);
            transition: background 0.2s;
        }
        .spoiler-header:active { background: rgba(0, 0, 0, 0.4); }
        
        .spoiler-title { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .spoiler-arrow { font-size: 12px; transition: transform 0.3s; color: #94a3b8; }
        .spoiler.open .spoiler-arrow { transform: rotate(180deg); }
        
        .spoiler-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            padding: 0 20px;
        }
        .spoiler.open .spoiler-content {
            max-height: 400px;
            padding: 15px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .size-control { display: flex; align-items: center; gap: 15px; }
        .size-slider {
            flex: 1;
            -webkit-appearance: none;
            height: 6px;
            border-radius: 3px;
            background: rgba(255,255,255,0.2);
            outline: none;
        }
        .size-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #10b981;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(16, 185, 129, 0.4);
        }
        .size-value { font-size: 20px; font-weight: bold; color: #10b981; min-width: 50px; text-align: right; }
        
        /* Сетка анимаций 3 колонки */
        .anim-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .anim-btn {
            padding: 10px 4px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: rgba(0,0,0,0.3);
            color: #94a3b8;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            line-height: 1.2;
        }
        .anim-btn.selected { border-color: #10b981; background: rgba(16, 185, 129, 0.2); color: #10b981; }
        
        .mode-toggle { display: flex; background: rgba(0,0,0,0.3); border-radius: 10px; padding: 4px; margin-top: 20px; margin-bottom: 20px; }
        .mode-btn { flex: 1; padding: 10px 5px; border: none; background: transparent; color: #94a3b8; border-radius: 8px; cursor: pointer; font-size: 12px; transition: all 0.2s; }
        .mode-btn.active { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        
        .color-section { display: none; }
        .color-section.active { display: block; }
        
        .color-wheel-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }
        
        .color-wheel {
            width: 100%;
            max-width: 280px;
            height: 280px;
            margin: 0 auto;
            border-radius: 50%;
            position: relative;
            cursor: crosshair;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            background: conic-gradient(from 0deg, 
                hsl(0, 100%, 50%),
                hsl(60, 100%, 50%),
                hsl(120, 100%, 50%),
                hsl(180, 100%, 50%),
                hsl(240, 100%, 50%),
                hsl(300, 100%, 50%),
                hsl(360, 100%, 50%)
            );
        }
        
        .color-wheel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%;
            background: radial-gradient(circle, white 0%, rgba(255,255,255,0) 65%);
            pointer-events: none;
        }
        
        .picker-dot {
            position: absolute;
            width: 24px; 
            height: 24px;
            background: transparent;
            border: 3px solid white;
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            box-shadow: 0 2px 8px rgba(0,0,0,0.5), inset 0 2px 4px rgba(0,0,0,0.3);
            z-index: 10;
            display: none;
        }
        .picker-dot.active { display: block; }
        
        .presets { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-bottom: 20px; }
        .preset-color {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 12px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.2s, border-color 0.2s;
            position: relative;
        }
        .preset-color:hover { transform: scale(1.1); }
        .preset-color.selected { border-color: #10b981; box-shadow: 0 0 0 2px #10b981; z-index: 1; }
        .preset-color.selected::after {
            content: '✓';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 16px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }
        
        .hex-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            font-size: 18px;
            font-family: monospace;
            text-align: center;
            text-transform: uppercase;
        }
        .hex-input:focus { outline: none; border-color: #10b981; }
        
        .image-section { display: none; }
        .image-section.active { display: block; }
        .upload-area {
            border: 2px dashed rgba(16, 185, 129, 0.3);
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            margin-bottom: 20px;
            background: rgba(16, 185, 129, 0.05);
            cursor: pointer;
        }
        .upload-icon { font-size: 48px; margin-bottom: 10px; }
        .upload-text { font-size: 14px; color: #94a3b8; }
        #fileInput { display: none; }
        .image-preview-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            display: none;
        }
        .image-preview-container.active { display: block; }
        .image-preview { width: 100%; max-height: 200px; object-fit: cover; border-radius: 12px; }
        .remove-image {
            position: absolute;
            top: 25px; right: 25px;
            background: rgba(239, 68, 68, 0.9);
            color: #fff;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .buttons {
            display: flex;
            gap: 10px;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: linear-gradient(transparent, #0f172a 20%);
            z-index: 100;
        }
        .btn { flex: 1; padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btn-apply { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: #fff; }
        .btn-apply:disabled { opacity: 0.5; }
        .btn-cancel { background: rgba(255, 255, 255, 0.1); color: #fff; }
    </style>
</head>
<body>
    <div class="header">
        <div class="element-tag" id="elementName">📞 ТЕЛЕФОН</div>
        <h1>Настройка элемента</h1>
    </div>
    
    <div class="preview-box" id="previewBox">
        <img class="preview-bg-image" id="previewBgImage" style="display: none;">
        <div class="preview-text" id="previewText">Пример текста</div>
    </div>
    
    <!-- Спойлер: Размер -->
    <div class="spoiler" id="sizeSpoiler">
        <div class="spoiler-header" onclick="toggleSpoiler('sizeSpoiler')">
            <div class="spoiler-title">📏 Размер текста</div>
            <div class="spoiler-arrow">▼</div>
        </div>
        <div class="spoiler-content">
            <div class="size-control">
                <input type="range" class="size-slider" id="sizeSlider" min="12" max="120" value="42">
                <div class="size-value" id="sizeValue">42</div>
            </div>
        </div>
    </div>
    
    <!-- Спойлер: Анимация (12 штук) -->
    <div class="spoiler" id="animSpoiler">
        <div class="spoiler-header" onclick="toggleSpoiler('animSpoiler')">
            <div class="spoiler-title">✨ Анимация</div>
            <div class="spoiler-arrow">▼</div>
        </div>
        <div class="spoiler-content">
            <div class="anim-grid" id="animGrid">
                <button class="anim-btn selected" data-anim="none">Нет</button>
                <button class="anim-btn" data-anim="pulse">💓 Пульс</button>
                <button class="anim-btn" data-anim="pulse-red">🔴 Красн.</button>
                <button class="anim-btn" data-anim="pulse-gold">🟡 Золото</button>
                <button class="anim-btn" data-anim="bounce">🏀 Прыжок</button>
                <button class="anim-btn" data-anim="shake">📳 Тряска</button>
                <button class="anim-btn" data-anim="glow">✨ Свечение</button>
                <button class="anim-btn" data-anim="rainbow">🌈 Радуга</button>
                <button class="anim-btn" data-anim="typing">⌨️ Печать</button>
                <button class="anim-btn" data-anim="slide-up">👆 Выезд</button>
                <button class="anim-btn" data-anim="scroll">📜 Бегущая</button>
                <button class="anim-btn" data-anim="fade">🔆 Мерцание</button>
                <button class="anim-btn" data-anim="rotate">🔄 Вращение</button>
            </div>
        </div>
    </div>
    
    <div class="mode-toggle">
        <button class="mode-btn active" onclick="setMode('color')">🎨 Текст</button>
        <button class="mode-btn" onclick="setMode('bg')">🖼 Фон</button>
        <button class="mode-btn" onclick="setMode('image')">📷 Картинка</button>
    </div>
    
    <div class="color-section active" id="colorSection">
        <div class="color-wheel-container">
            <div class="color-wheel" id="colorWheel">
                <div class="picker-dot" id="pickerDot"></div>
            </div>
        </div>
        <div class="presets" id="presets"></div>
        <input type="text" class="hex-input" id="hexInput" value="#FFFFFF" maxlength="7">
    </div>
    
    <div class="image-section" id="imageSection">
        <input type="file" id="fileInput" accept="image/*" onchange="handleFileSelect(event)">
        <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">📁</div>
            <div class="upload-text">Нажмите для выбора картинки<br>PNG, JPG</div>
        </div>
        <div class="image-preview-container" id="previewContainer">
            <img class="image-preview" id="imagePreview">
            <button class="remove-image" onclick="removeImage()">×</button>
        </div>
    </div>
    
    <div class="buttons">
        <button class="btn btn-cancel" onclick="cancel()">❌ Отмена</button>
        <button class="btn btn-apply" id="applyBtn" onclick="apply()">✅ Применить</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        const urlParams = new URLSearchParams(window.location.search);
        const element = urlParams.get('element') || 'phone';
        const currentColor = '#' + (urlParams.get('current') || 'ffffff').replace('#', '');
        const currentBg = '#' + (urlParams.get('bg') || '000000').replace('#', '');
        const currentSize = parseInt(urlParams.get('size')) || 42;
        const currentAnim = urlParams.get('anim') || 'none';
        
        let currentMode = 'color';
        let selectedColor = currentColor;
        let selectedBg = currentBg;
        let selectedSize = currentSize;
        let selectedAnim = currentAnim;
        let selectedImageBase64 = null;
        let selectedImageName = null;
        let isDragging = false;
        
        const elementNames = {
            'phone': '📞 Телефон', 'schedule': '📅 Расписание', 'lunch': '🍽 Обед',
            'away': '⏳ Отошёл', 'dayoff': '🏖 Выходной', 'vacation': '🏝 Отпуск',
            'onsite': '🚗 Выезд', 'holiday': '🎉 Праздник', 'ad': '📢 Реклама',
            'custom_text': '📝 Свой текст', 'short_day': '⏱ Сокр.день'
        };
        
        document.getElementById('elementName').textContent = elementNames[element] || element;
        
        document.getElementById('sizeSlider').value = selectedSize;
        document.getElementById('sizeValue').textContent = selectedSize;
        
        function toggleSpoiler(id) {
            document.getElementById(id).classList.toggle('open');
        }
        
        document.querySelectorAll('.anim-btn').forEach(btn => {
            btn.classList.toggle('selected', btn.dataset.anim === selectedAnim);
            btn.onclick = () => {
                selectedAnim = btn.dataset.anim;
                document.querySelectorAll('.anim-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                updatePreview();
            };
        });
        
        document.getElementById('sizeSlider').addEventListener('input', (e) => {
            selectedSize = parseInt(e.target.value);
            document.getElementById('sizeValue').textContent = selectedSize;
            updatePreview();
        });
        
        const colors = [
            '#ffffff', '#000000', '#ff0000', '#00ff00', '#0000ff',
            '#ffff00', '#ff00ff', '#00ffff', '#ff8800', '#8800ff',
            '#ff4444', '#44ff44', '#4444ff', '#ffaa00', '#ff00aa',
            '#10b981', '#ef4444', '#3b82f6', '#f59e0b', '#8b5cf6',
            '#ec4899', '#14b8a6', '#f97316', '#6366f1', '#84cc16'
        ];
        
        const presetsContainer = document.getElementById('presets');
        colors.forEach(color => {
            const div = document.createElement('div');
            div.className = 'preset-color';
            div.style.background = color;
            div.onclick = () => selectColor(color);
            presetsContainer.appendChild(div);
        });
        
        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach((btn, i) => {
                btn.classList.toggle('active', ['color', 'bg', 'image'][i] === mode);
            });
            document.getElementById('colorSection').classList.toggle('active', mode !== 'image');
            document.getElementById('imageSection').classList.toggle('active', mode === 'image');
            updatePreview();
        }
        
        function selectColor(color) {
            selectedColor = color.toLowerCase();
            document.getElementById('hexInput').value = selectedColor;
            document.querySelectorAll('.preset-color').forEach(p => {
                p.classList.toggle('selected', p.style.background.toLowerCase() === selectedColor);
            });
            updatePreview();
        }
        
        function updatePreview() {
            const previewText = document.getElementById('previewText');
            const previewBox = document.getElementById('previewBox');
            const previewBg = document.getElementById('previewBgImage');
            
            previewText.style.fontSize = selectedSize + 'px';
            previewText.className = 'preview-text anim-' + selectedAnim;
            if (selectedAnim === 'none') previewText.classList.remove('anim-none');
            
            if (currentMode === 'image' && selectedImageBase64) {
                previewBg.src = selectedImageBase64;
                previewBg.style.display = 'block';
                previewBox.style.background = 'transparent';
                previewText.style.color = currentColor;
            } else {
                previewBg.style.display = 'none';
                if (currentMode === 'color') {
                    previewText.style.color = selectedColor;
                    previewBox.style.background = selectedBg;
                } else {
                    previewBox.style.background = selectedColor;
                    previewText.style.color = currentColor;
                }
            }
        }
        
        const wheel = document.getElementById('colorWheel');
        const dot = document.getElementById('pickerDot');
        
        function pickColor(e) {
            e.preventDefault();
            const rect = wheel.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            const x = clientX - rect.left;
            const y = clientY - rect.top;
            
            dot.style.left = x + 'px';
            dot.style.top = y + 'px';
            dot.classList.add('active');
            
            const dx = x - rect.width / 2;
            const dy = y - rect.height / 2;
            let angle = Math.atan2(dy, dx) * (180 / Math.PI) + 90;
            if (angle < 0) angle += 360;
            
            const distance = Math.sqrt(dx*dx + dy*dy);
            const maxRadius = rect.width / 2;
            const saturation = Math.min((distance / maxRadius) * 100, 100);
            
            let lightness = 50;
            if (distance < 30) lightness = 100;
            
            const color = hslToHex(angle, saturation, lightness);
            selectColor(color);
        }
        
        function hslToHex(h, s, l) {
            s /= 100; l /= 100;
            const a = s * Math.min(l, 1 - l);
            const f = n => {
                const k = (n + h / 30) % 12;
                return Math.round(255 * (l - a * Math.max(-1, Math.min(k - 3, 9 - k, 1))));
            };
            const toHex = v => v.toString(16).padStart(2, '0');
            return `#${toHex(f(0))}${toHex(f(8))}${toHex(f(4))}`;
        }
        
        wheel.addEventListener('mousedown', (e) => { isDragging = true; pickColor(e); });
        wheel.addEventListener('touchstart', (e) => { isDragging = true; pickColor(e); }, {passive: false});
        window.addEventListener('mousemove', (e) => { if (isDragging) pickColor(e); });
        window.addEventListener('touchmove', (e) => { if (isDragging) pickColor(e); }, {passive: false});
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('touchend', () => isDragging = false);
        
        document.getElementById('hexInput').addEventListener('input', (e) => {
            const val = e.target.value;
            if (/^#[0-9A-Fa-f]{6}$/.test(val)) selectColor(val.toLowerCase());
        });
        
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            if (file.size > 5 * 1024 * 1024) {
                tg.showAlert('Файл слишком большой (макс. 5MB)');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_SIZE = 800;
                    let w = img.width, h = img.height;
                    if (w > h && w > MAX_SIZE) { h = Math.round(h * MAX_SIZE / w); w = MAX_SIZE; }
                    else if (h > MAX_SIZE) { w = Math.round(w * MAX_SIZE / h); h = MAX_SIZE; }
                    
                    canvas.width = w;
                    canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    
                    selectedImageBase64 = canvas.toDataURL('image/jpeg', 0.8);
                    selectedImageName = file.name.replace(/[^a-zA-Z0-9.]/g, '_');
                    
                    document.getElementById('imagePreview').src = selectedImageBase64;
                    document.getElementById('previewContainer').classList.add('active');
                    document.getElementById('uploadArea').style.display = 'none';
                    updatePreview();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
        
        function removeImage() {
            selectedImageBase64 = null;
            selectedImageName = null;
            document.getElementById('fileInput').value = '';
            document.getElementById('previewContainer').classList.remove('active');
            document.getElementById('uploadArea').style.display = 'block';
            updatePreview();
        }
        
        function apply() {
            document.getElementById('applyBtn').disabled = true;
            
            let data = {
                action: 'customize_full',
                element: element,
                size: selectedSize,
                animation: selectedAnim
            };
            
            if (currentMode === 'image' && selectedImageBase64) {
                data.field = 'bg_image';
                data.image_base64 = selectedImageBase64;
                data.filename = selectedImageName || 'bg.jpg';
            } else if (currentMode === 'bg') {
                data.field = 'bg';
                data.value = selectedColor;
            } else {
                data.field = 'color';
                data.value = selectedColor;
            }
            
            tg.sendData(JSON.stringify(data));
            tg.close();
        }
        
        function cancel() {
            tg.close();
        }
        
        selectColor(currentColor);
        updatePreview();
        
        if (currentSize !== 42) document.getElementById('sizeSpoiler').classList.add('open');
        if (currentAnim !== 'none') document.getElementById('animSpoiler').classList.add('open');
    </script>
</body>
</html>
