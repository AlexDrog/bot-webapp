<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Редактор карусели</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1e;
            min-height: 100vh;
            color: white;
            padding: 15px;
            padding-bottom: 100px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .header h1 {
            font-size: 20px;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }
        
        .header p {
            font-size: 13px;
            color: #8b92a8;
        }
        
        .stats-bar {
            background: rgba(102, 126, 234, 0.15);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-around;
            font-size: 13px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            font-size: 11px;
            color: #8b92a8;
            margin-top: 2px;
        }
        
        /* ОДНА КОЛОНКА для телеграм-попапа (400-500px) */
        .slides-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 80px;
        }
        
        .slide-item {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            overflow: hidden;
            cursor: grab;
            position: relative;
        }
        
        .slide-item:active {
            cursor: grabbing;
        }
        
        /* Крупное превью */
        .slide-preview {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
            background: #1a1a2e;
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }
        
        .slide-text {
            width: 100%;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-size: 18px;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            word-break: break-word;
        }
        
        .slide-schedule {
            width: 100%;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            background: #2d3561;
            position: relative;
        }
        
        .slide-schedule::after {
            content: 'РАСПИСАНИЕ';
            font-size: 14px;
            position: absolute;
            bottom: 15px;
            color: #667eea;
            letter-spacing: 2px;
        }
        
        .slide-number {
            position: absolute;
            top: 10px;
            left: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            border: 2px solid rgba(255,255,255,0.3);
            z-index: 10;
        }
        
        .slide-type-badge {
            position: absolute;
            top: 10px;
            right: 50px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            text-transform: uppercase;
        }
        
        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ff3b30;
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            z-index: 10;
        }
        
        .controls-panel {
            padding: 15px;
            background: rgba(0,0,0,0.4);
        }
        
        .duration-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 14px;
            color: #8b92a8;
        }
        
        .duration-current {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        
        .duration-buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        
        .btn-dur {
            background: rgba(102, 126, 234, 0.3);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
        }
        
        .btn-dur:active {
            background: rgba(102, 126, 234, 0.5);
        }
        
        .duration-input {
            flex: 1;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 16px;
            text-align: center;
        }
        
        .quick-times {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        
        .quick-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #aaa;
            padding: 6px 12px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
            flex: 1;
            min-width: 50px;
        }
        
        .quick-btn.active {
            background: rgba(102, 126, 234, 0.5);
            border-color: #667eea;
            color: white;
        }
        
        .slide-caption {
            padding: 8px 15px;
            font-size: 12px;
            color: #aaa;
            text-align: center;
            background: rgba(0,0,0,0.3);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(26, 26, 46, 0.98);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 15px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }
        
        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #8b92a8;
        }
        
        .empty-state-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }
        
        .debug-info {
            background: rgba(255,0,0,0.1);
            border: 1px solid rgba(255,0,0,0.3);
            color: #ff6b6b;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 8px;
            font-size: 12px;
            font-family: monospace;
            word-break: break-all;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🎠 Редактор карусели</h1>
    <p id="debugText">Загрузка...</p>
</div>

<div class="stats-bar">
    <div class="stat-item">
        <div class="stat-value" id="totalSlides">0</div>
        <div class="stat-label">слайдов</div>
    </div>
    <div class="stat-item">
        <div class="stat-value" id="totalTime">0с</div>
        <div class="stat-label">время</div>
    </div>
</div>

<div id="debugPanel" class="debug-info" style="display:none"></div>

<div id="slidesContainer" class="slides-grid"></div>

<div id="emptyState" class="empty-state" style="display: none;">
    <div class="empty-state-icon">📭</div>
    <p>Нет слайдов</p>
</div>

<div class="footer">
    <button class="btn btn-secondary" onclick="tg.close()">Отмена</button>
    <button class="btn btn-primary" onclick="saveAndClose()">Сохранить</button>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    
    // URL твоего сервера - ВАЖНО!
    const SERVER_URL = 'http://192.168.100.7:5000';
    
    let slides = [];
    const debugPanel = document.getElementById('debugPanel');
    const debugText = document.getElementById('debugText');
    
    function showDebug(msg) {
        console.log(msg);
        debugPanel.style.display = 'block';
        debugPanel.textContent += msg + '\n';
    }
    
    function loadSlides() {
        try {
            const params = new URLSearchParams(window.location.search);
            const data = params.get('data');
            
            showDebug('Data length: ' + (data ? data.length : 0));
            
            if (!data) {
                showDebug('Нет данных в URL!');
                slides = [];
                render();
                return;
            }
            
            // Декодирование
            let padded = data;
            while (padded.length % 4) padded += '=';
            const standardBase64 = padded.replace(/-/g, '+').replace(/_/g, '/');
            const jsonStr = atob(standardBase64);
            
            showDebug('JSON: ' + jsonStr.substring(0, 100) + '...');
            
            const rawSlides = JSON.parse(jsonStr);
            showDebug('Parsed: ' + rawSlides.length + ' items');
            
            if (rawSlides.length > 0) {
                showDebug('First keys: ' + Object.keys(rawSlides[0]).join(', '));
            }
            
            // Маппинг ключей (короткие или длинные)
            slides = rawSlides.map((s, i) => {
                const slide = {
                    type: s.t || s.type || 'text',
                    duration: s.d || s.duration || 10,
                    filename: s.f || s.filename || null,
                    text: s.x || s.text || '',
                    structure: s.s || s.structure || null
                };
                
                if (i === 0) {
                    showDebug(`Slide 0: type=${slide.type}, file=${slide.filename || 'none'}, text=${slide.text ? 'yes' : 'no'}`);
                }
                
                return slide;
            });
            
            debugText.textContent = `Загружено: ${slides.length} слайдов`;
            
        } catch (e) {
            showDebug('ОШИБКА: ' + e.message);
            slides = [];
        }
        
        updateStats();
        render();
    }
    
    function updateStats() {
        const total = slides.length;
        const totalTime = slides.reduce((sum, s) => sum + (s.duration || 10), 0);
        
        document.getElementById('totalSlides').textContent = total;
        document.getElementById('totalTime').textContent = totalTime < 60 ? totalTime + 'с' : Math.round(totalTime/60) + 'м';
    }
    
    function render() {
        const container = document.getElementById('slidesContainer');
        const emptyState = document.getElementById('emptyState');
        
        if (slides.length === 0) {
            container.style.display = 'none';
            emptyState.style.display = 'block';
            return;
        }
        
        container.style.display = 'flex';
        emptyState.style.display = 'none';
        container.innerHTML = '';
        
        slides.forEach((slide, index) => {
            const item = createSlideElement(slide, index);
            container.appendChild(item);
        });
        
        // Sortable
        new Sortable(container, {
            animation: 150,
            onEnd: function() {
                updateOrder();
            }
        });
    }
    
    function createSlideElement(slide, index) {
        const div = document.createElement('div');
        div.className = 'slide-item';
        div.dataset.index = index;
        
        const typeLabel = {
            'image': '🖼',
            'text': '📝',
            'schedule': '📅'
        }[slide.type] || slide.type;
        
        let content = '';
        
        // КАРТИНКА с полным URL
        if (slide.type === 'image' && slide.filename) {
            const imgUrl = `${SERVER_URL}/slides/${slide.filename}`;
            showDebug(`Img ${index}: ${imgUrl}`);
            
            content = `<img class="slide-preview" 
                src="${imgUrl}" 
                alt="Slide ${index + 1}"
                onload="console.log('Loaded: ${slide.filename}')"
                onerror="console.error('Failed: ${slide.filename}'); this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22><rect fill=%22%231a1a2e%22 width=%22200%22 height=%22200%22/><text fill=%22%23667eea%22 x=%22100%22 y=%22100%22 text-anchor=%22middle%22 font-size=%2260%22>🖼</text><text fill=%22%23888%22 x=%22100%22 y=%22140%22 text-anchor=%22middle%22 font-size=%2212%22>${slide.filename.substring(0,15)}</text></svg>'">`;
        }
        else if (slide.type === 'schedule') {
            content = `<div class="slide-schedule">📅</div>`;
        }
        else {
            content = `<div class="slide-text">${escapeHtml(slide.text || 'Без текста')}</div>`;
        }
        
        // Подпись
        let caption = '';
        if (slide.filename) {
            caption = `<div class="slide-caption">${slide.filename}</div>`;
        } else if (slide.text && slide.type !== 'text') {
            caption = `<div class="slide-caption">${slide.text.substring(0, 40)}</div>`;
        }
        
        const dur = slide.duration || 10;
        
        div.innerHTML = `
            <div class="slide-number">${index + 1}</div>
            <div class="slide-type-badge">${typeLabel}</div>
            <button class="delete-btn" onclick="deleteSlide(${index})">×</button>
            ${content}
            ${caption}
            <div class="controls-panel">
                <div class="duration-row">
                    <span>Время показа:</span>
                    <span class="duration-current" id="dur-disp-${index}">${dur}с</span>
                </div>
                <div class="duration-buttons">
                    <button class="btn-dur" onclick="changeDur(${index}, -5)">−</button>
                    <input type="number" class="duration-input" id="dur-inp-${index}" 
                           value="${dur}" min="1" max="300"
                           onchange="setDur(${index}, this.value)">
                    <button class="btn-dur" onclick="changeDur(${index}, 5)">+</button>
                </div>
                <div class="quick-times">
                    <button class="quick-btn ${dur===5?'active':''}" onclick="setDur(${index}, 5)">5с</button>
                    <button class="quick-btn ${dur===10?'active':''}" onclick="setDur(${index}, 10)">10с</button>
                    <button class="quick-btn ${dur===15?'active':''}" onclick="setDur(${index}, 15)">15с</button>
                    <button class="quick-btn ${dur===30?'active':''}" onclick="setDur(${index}, 30)">30с</button>
                    <button class="quick-btn ${dur===60?'active':''}" onclick="setDur(${index}, 60)">1м</button>
                </div>
            </div>
        `;
        
        return div;
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function changeDur(idx, delta) {
        const inp = document.getElementById(`dur-inp-${idx}`);
        setDur(idx, parseInt(inp.value) + delta);
    }
    
    function setDur(idx, val) {
        let v = parseInt(val);
        if (isNaN(v) || v < 1) v = 1;
        if (v > 300) v = 300;
        
        slides[idx].duration = v;
        
        const inp = document.getElementById(`dur-inp-${idx}`);
        const disp = document.getElementById(`dur-disp-${idx}`);
        if (inp) inp.value = v;
        if (disp) disp.textContent = v + 'с';
        
        // Обновить кнопки
        const btns = inp.closest('.controls-panel').querySelectorAll('.quick-btn');
        btns.forEach(b => b.classList.remove('active'));
        if ([5,10,15,30,60].includes(v)) {
            const active = Array.from(btns).find(b => 
                (v===60 && b.textContent==='1м') || b.textContent===v+'с'
            );
            if (active) active.classList.add('active');
        }
        
        updateStats();
    }
    
    function updateOrder() {
        const items = document.querySelectorAll('.slide-item');
        const newSlides = [];
        
        items.forEach((item, newIdx) => {
            const oldIdx = parseInt(item.dataset.index);
            const inp = document.getElementById(`dur-inp-${oldIdx}`);
            const slide = {...slides[oldIdx]};
            slide.duration = parseInt(inp?.value) || 10;
            slide.order = newIdx;
            newSlides.push(slide);
        });
        
        slides = newSlides;
        render(); // Перерисовать для обновления номеров
    }
    
    function deleteSlide(idx) {
        if (confirm('Удалить слайд?')) {
            slides.splice(idx, 1);
            updateStats();
            render();
        }
    }
    
    function saveAndClose() {
        // Собрать текущие данные
        const items = document.querySelectorAll('.slide-item');
        const finalSlides = [];
        
        items.forEach((item, idx) => {
            const oldIdx = parseInt(item.dataset.index);
            const inp = document.getElementById(`dur-inp-${oldIdx}`);
            const slide = slides[oldIdx];
            slide.duration = parseInt(inp?.value) || 10;
            slide.order = idx;
            finalSlides.push(slide);
        });
        
        const data = {
            action: 'carousel_update',
            slides: finalSlides.map(s => ({
                type: s.type,
                filename: s.filename,
                text: s.text || '',
                duration: s.duration,
                structure: s.structure,
                order: s.order
            }))
        };
        
        tg.sendData(JSON.stringify(data));
        tg.showPopup({
            title: '✅ Готово',
            message: `Сохранено ${finalSlides.length} слайдов`,
            buttons: [{type: 'ok'}]
        }, () => tg.close());
    }
    
    // Загрузка
    loadSlides();
</script>

</body>
</html>
