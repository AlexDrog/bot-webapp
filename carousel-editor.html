<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Редактор карусели</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: white;
            padding: 16px;
            padding-bottom: 100px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
            padding-top: 10px;
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header p {
            font-size: 14px;
            color: #8b92a8;
        }
        
        .slides-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 80px;
        }
        
        .slide-item {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            overflow: hidden;
            cursor: grab;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .slide-item.sortable-ghost {
            opacity: 0.5;
            background: rgba(102, 126, 234, 0.2);
        }
        
        .slide-item.sortable-drag {
            cursor: grabbing;
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 1000;
        }
        
        .slide-preview {
            width: 100%;
            height: 120px;
            object-fit: cover;
            display: block;
            background: #0f0f1e;
        }
        
        .slide-text {
            width: 100%;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            font-size: 14px;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            word-break: break-word;
            overflow: hidden;
        }
        
        .slide-schedule {
            width: 100%;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            background: #2d3561;
        }
        
        .slide-info {
            padding: 12px;
            background: rgba(0,0,0,0.3);
        }
        
        .slide-number {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(0,0,0,0.7);
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            border: 2px solid rgba(255,255,255,0.3);
        }
        
        .delete-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(255, 59, 48, 0.9);
            color: white;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            z-index: 10;
        }
        
        .delete-btn:hover {
            background: #ff3b30;
            transform: scale(1.1);
        }
        
        .duration-control {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
        }
        
        .duration-label {
            font-size: 12px;
            color: #8b92a8;
            white-space: nowrap;
        }
        
        .duration-input {
            flex: 1;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 14px;
            width: 60px;
            text-align: center;
        }
        
        .duration-input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 16px;
            display: flex;
            gap: 12px;
            z-index: 100;
        }
        
        .btn {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #8b92a8;
        }
        
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        .drag-hint {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 24px;
            font-size: 14px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1000;
        }
        
        .drag-hint.show {
            opacity: 1;
        }
        
        @media (max-width: 380px) {
            .slides-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🎠 Редактор карусели</h1>
    <p>Тяните карточки для смены порядка • Нажмите 🗑 для удаления</p>
</div>

<div id="slidesContainer" class="slides-grid"></div>

<div id="emptyState" class="empty-state" style="display: none;">
    <div class="empty-state-icon">📭</div>
    <p>Нет слайдов для редактирования</p>
</div>

<div class="drag-hint" id="dragHint">👆 Перетащите для изменения порядка</div>

<div class="footer">
    <button class="btn btn-secondary" onclick="cancelAndClose()">Отмена</button>
    <button class="btn btn-primary" onclick="saveAndClose()">💾 Сохранить</button>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    
    let slides = [];
    const container = document.getElementById('slidesContainer');
    const emptyState = document.getElementById('emptyState');
    
    // Получаем данные из URL
    function loadSlides() {
        try {
            const params = new URLSearchParams(window.location.search);
            const data = params.get('data');
            
            if (data) {
                const jsonStr = atob(decodeURIComponent(data));
                slides = JSON.parse(jsonStr);
                if (!Array.isArray(slides)) slides = [];
            }
        } catch (e) {
            console.error('Error loading slides:', e);
            slides = [];
        }
        
        renderSlides();
    }
    
    // Рендер слайдов
    function renderSlides() {
        if (slides.length === 0) {
            container.style.display = 'none';
            emptyState.style.display = 'block';
            return;
        }
        
        container.style.display = 'grid';
        emptyState.style.display = 'none';
        container.innerHTML = '';
        
        slides.forEach((slide, index) => {
            const item = createSlideElement(slide, index);
            container.appendChild(item);
        });
        
        // Инициализация SortableJS
        new Sortable(container, {
            animation: 150,
            ghostClass: 'sortable-ghost',
            dragClass: 'sortable-drag',
            onStart: function() {
                document.getElementById('dragHint').classList.add('show');
            },
            onEnd: function() {
                document.getElementById('dragHint').classList.remove('show');
                updateOrder();
            }
        });
    }
    
    // Создание элемента слайда
    function createSlideElement(slide, index) {
        const div = document.createElement('div');
        div.className = 'slide-item';
        div.dataset.index = index;
        
        let content = '';
        
        if (slide.type === 'image' && slide.filename) {
            content = `<img class="slide-preview" src="slides/${slide.filename}" alt="Slide" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22><rect fill=%22%23333%22 width=%22100%22 height=%22100%22/><text fill=%22%23999%22 x=%2250%22 y=%2250%22 text-anchor=%22middle%22>%F0%9F%96%BC</text></svg>'">`;
        } else if (slide.type === 'schedule') {
            content = `<div class="slide-schedule">📅</div>`;
        } else {
            content = `<div class="slide-text">${escapeHtml(slide.text || 'Без текста')}</div>`;
        }
        
        div.innerHTML = `
            <div class="slide-number">${index + 1}</div>
            <button class="delete-btn" onclick="deleteSlide(${index})" title="Удалить">×</button>
            ${content}
            <div class="slide-info">
                <div class="duration-control">
                    <span class="duration-label">⏱</span>
                    <input type="number" class="duration-input" 
                           value="${slide.duration || 10}" 
                           min="1" max="300" 
                           onchange="updateDuration(${index}, this.value)"
                           onclick="this.select()">
                    <span class="duration-label">сек</span>
                </div>
            </div>
        `;
        
        return div;
    }
    
    // Экранирование HTML
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // Обновление порядка после drag-and-drop
    function updateOrder() {
        const items = container.querySelectorAll('.slide-item');
        const newSlides = [];
        
        items.forEach((item, newIndex) => {
            const oldIndex = parseInt(item.dataset.index);
            const slide = {...slides[oldIndex]};
            slide.duration = parseInt(item.querySelector('.duration-input').value) || 10;
            slide.order = newIndex;
            newSlides.push(slide);
            
            // Обновляем номер на карточке
            const numberEl = item.querySelector('.slide-number');
            if (numberEl) numberEl.textContent = newIndex + 1;
            
            // Обновляем dataset.index для следующих операций
            item.dataset.index = newIndex;
            // Обновляем обработчики
            const deleteBtn = item.querySelector('.delete-btn');
            deleteBtn.setAttribute('onclick', `deleteSlide(${newIndex})`);
            const durationInput = item.querySelector('.duration-input');
            durationInput.setAttribute('onchange', `updateDuration(${newIndex}, this.value)`);
        });
        
        slides = newSlides;
    }
    
    // Удаление слайда
    function deleteSlide(index) {
        if (confirm('Удалить этот слайд?')) {
            slides.splice(index, 1);
            renderSlides();
        }
    }
    
    // Обновление длительности
    function updateDuration(index, value) {
        let val = parseInt(value);
        if (val < 1) val = 1;
        if (val > 300) val = 300;
        slides[index].duration = val;
    }
    
    // Сохранение и отправка в бот
    function saveAndClose() {
        // Обновляем порядок и данные перед отправкой
        updateOrder();
        
        // Формируем данные для отправки
        const data = {
            action: 'carousel_update',
            slides: slides.map((slide, index) => ({
                type: slide.type,
                filename: slide.filename || null,
                text: slide.text || '',
                duration: slide.duration || 10,
                structure: slide.structure || null,
                order: index
            }))
        };
        
        // Отправляем данные в бот
        tg.sendData(JSON.stringify(data));
        
        // Показываем успех и закрываем
        tg.showPopup({
            title: '✅ Готово',
            message: `Сохранено ${slides.length} слайдов`,
            buttons: [{type: 'ok'}]
        }, function() {
            tg.close();
        });
    }
    
    // Отмена
    function cancelAndClose() {
        tg.close();
    }
    
    // Инициализация
    loadSlides();
</script>

</body>
</html>
