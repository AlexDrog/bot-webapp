<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Редактор карусели</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-color: #1a1a2e;
            --text-color: #ffffff;
            --hint-color: #8b92a8;
            --button-color: #667eea;
            --button-text-color: #ffffff;
            --secondary-bg-color: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            padding: 10px;
            padding-bottom: 120px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .header {
            text-align: center;
            margin-bottom: 15px;
            position: sticky;
            top: 0;
            background: rgba(26, 26, 46, 0.98);
            backdrop-filter: blur(10px);
            padding: 10px;
            border-radius: 12px;
            z-index: 50;
            border: 1px solid rgba(102, 126, 234, 0.3);
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            font-size: 11px;
            color: var(--hint-color);
            margin-top: 5px;
        }

        .slides-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .slide-item {
            background: var(--secondary-bg-color);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
            cursor: grab;
            position: relative;
            touch-action: pan-y;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .slide-item:active {
            cursor: grabbing;
        }

        .slide-item.sortable-ghost {
            opacity: 0.4;
            background: rgba(102, 126, 234, 0.2);
        }

        .slide-item.sortable-drag {
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transform: scale(1.02);
        }

        .preview-container {
            width: 100%;
            height: 140px;
            position: relative;
            background: linear-gradient(135deg, #1a1a2e 0%, #2d2d44 100%);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
        }

        .slide-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .image-fallback {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2d2d44 0%, #1a1a2e 100%);
            color: #667eea;
            padding: 15px;
        }

        .slide-text {
            width: 100%;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-size: 16px;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            word-break: break-word;
            color: white;
        }

        .slide-schedule {
            width: 100%;
            height: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2d3561 0%, #1e2746 100%);
            color: white;
        }

        .slide-number {
            position: absolute;
            top: 8px;
            left: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: bold;
            z-index: 10;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .slide-type-badge {
            position: absolute;
            top: 8px;
            left: 42px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            color: white;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 10px;
            z-index: 10;
        }

        .delete-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #ff3b30;
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            transition: transform 0.2s, background 0.2s;
        }

        .delete-btn:hover {
            background: #ff1a1a;
            transform: scale(1.05);
        }

        .delete-btn:active {
            transform: scale(0.95);
        }

        .controls-panel {
            padding: 12px;
            background: rgba(0,0,0,0.3);
        }

        .duration-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 12px;
            color: var(--hint-color);
        }

        .duration-current {
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
        }

        .duration-buttons {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
        }

        .btn-dur {
            background: rgba(102, 126, 234, 0.3);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            transition: background 0.2s;
        }

        .btn-dur:hover {
            background: rgba(102, 126, 234, 0.5);
        }

        .btn-dur:active {
            background: rgba(102, 126, 234, 0.7);
        }

        .duration-input {
            flex: 1;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 16px;
            text-align: center;
        }

        .quick-times {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .quick-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #aaa;
            padding: 6px 12px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
            flex: 1;
            transition: all 0.2s;
        }

        .quick-btn:hover {
            background: rgba(255,255,255,0.15);
        }

        .quick-btn.active {
            background: rgba(102, 126, 234, 0.6);
            border-color: #667eea;
            color: white;
        }

        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(26, 26, 46, 0.98);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 12px 15px calc(12px + env(safe-area-inset-bottom));
            display: flex;
            gap: 10px;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .saving-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
            backdrop-filter: blur(5px);
        }

        .saving-overlay.active {
            display: flex;
        }

        .saving-indicator {
            background: rgba(26, 26, 46, 0.98);
            padding: 20px 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            color: white;
        }

        .saving-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(102, 126, 234, 0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--hint-color);
        }

        .error-message {
            background: rgba(255, 59, 48, 0.2);
            border: 1px solid #ff3b30;
            color: #ff3b30;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            font-size: 14px;
        }

        @media (min-width: 600px) {
            .slides-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎠 Редактор карусели</h1>
        <p id="statusText">Загрузка...</p>
    </div>

    <div id="slidesContainer" class="slides-grid"></div>

    <div class="footer">
        <button class="btn btn-secondary" onclick="cancelAndClose()">Отмена</button>
        <button class="btn btn-primary" id="saveBtn" onclick="saveAndClose()">💾 Сохранить</button>
    </div>

    <div class="saving-overlay" id="savingOverlay">
        <div class="saving-indicator">
            <div class="saving-spinner"></div>
            <div>Сохранение изменений...</div>
            <div style="font-size: 12px; color: #8b92a8; margin-top: 5px;">Пожалуйста, подождите</div>
        </div>
    </div>

<script>
    (function() {
        'use strict';

        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        
        // Проверка инициализации
        if (!tg) {
            document.body.innerHTML = '<div class="error-message">Ошибка: Telegram WebApp API не загружен</div>';
            return;
        }

        // Инициализация
        tg.ready();
        tg.expand();

        // Получаем bot_username из URL
        const urlParams = new URLSearchParams(window.location.search);
        const botUsername = urlParams.get('bot') || 'alexdrog_bot'; // fallback

        // Применяем тему Telegram - ИСПРАВЛЕННЫЕ ЦВЕТА
        const applyTheme = () => {
            const theme = tg.themeParams;
            
            document.body.style.backgroundColor = theme.bg_color || '#1a1a2e';
            document.body.style.color = theme.text_color || '#ffffff';
            
            const root = document.documentElement;
            root.style.setProperty('--bg-color', theme.bg_color || '#1a1a2e');
            root.style.setProperty('--text-color', theme.text_color || '#ffffff');
            root.style.setProperty('--hint-color', theme.hint_color || '#8b92a8');
            root.style.setProperty('--button-color', theme.button_color || '#667eea');
            root.style.setProperty('--button-text-color', theme.button_text_color || '#ffffff');
            root.style.setProperty('--secondary-bg-color', theme.secondary_bg_color || 'rgba(255, 255, 255, 0.05)');
            
            if (tg.setHeaderColor) {
                tg.setHeaderColor(theme.bg_color || '#1a1a2e');
            }
        };
        
        applyTheme();
        tg.onEvent('themeChanged', applyTheme);

        // Состояние приложения
        let slides = [];
        let sortableInstance = null;
        let isSaving = false;

        const MIN_DURATION = 1;
        const MAX_DURATION = 300;
        const DEFAULT_DURATION = 10;

        // Утилита для безопасного декодирования Base64 из URL
        function decodeBase64FromURL(urlData) {
            try {
                let decoded = decodeURIComponent(urlData);
                while (decoded.length % 4) {
                    decoded += '=';
                }
                const jsonStr = atob(decoded);
                return JSON.parse(jsonStr);
            } catch (e) {
                console.error('Decode error:', e);
                throw new Error(`Ошибка декодирования данных: ${e.message}`);
            }
        }

        // Кодирование данных для URL (безопасное base64)
        function encodeBase64ForURL(data) {
            try {
                const jsonStr = JSON.stringify(data);
                let base64 = btoa(jsonStr);
                // Убираем padding для компактности
                base64 = base64.replace(/=+$/, '');
                // URL-safe замены
                return base64.replace(/\+/g, '-').replace(/\//g, '_');
            } catch (e) {
                console.error('Encode error:', e);
                throw e;
            }
        }

        // Нормализация слайда
        function normalizeSlide(slide, index) {
            return {
                type: slide.type || 'text',
                duration: Math.min(MAX_DURATION, Math.max(MIN_DURATION, 
                    parseInt(slide.duration) || DEFAULT_DURATION)),
                filename: slide.filename || null,
                text: slide.text || '',
                structure: slide.structure || null
            };
        }

        // Загрузка слайдов
        function loadSlides() {
            try {
                const params = new URLSearchParams(window.location.search);
                const data = params.get('data');

                if (!data) {
                    updateStatus('Нет данных - пустая карусель');
                    slides = [];
                    render();
                    return;
                }

                const rawSlides = decodeBase64FromURL(data);
                
                if (!Array.isArray(rawSlides)) {
                    throw new Error('Неверный формат данных');
                }

                slides = rawSlides.map((s, i) => normalizeSlide(s, i));
                
                updateStatus(`Слайдов: ${slides.length} (тащите для сортировки)`);
                render();

            } catch (e) {
                console.error('Load error:', e);
                updateStatus(`Ошибка: ${e.message}`);
                showError(`Ошибка загрузки: ${e.message}`);
                slides = [];
                render();
            }
        }

        // Обновление статуса
        function updateStatus(text) {
            const statusEl = document.getElementById('statusText');
            if (statusEl) {
                statusEl.textContent = text;
            }
        }

        // Показ ошибки
        function showError(message) {
            const container = document.getElementById('slidesContainer');
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.textContent = message;
            container.insertBefore(errorDiv, container.firstChild);
            
            setTimeout(() => errorDiv.remove(), 5000);
        }

        // Экранирование HTML
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Создание элемента слайда
        function createSlideElement(slide, index) {
            const div = document.createElement('div');
            div.className = 'slide-item';
            div.dataset.index = index;
            div.dataset.type = slide.type || 'text';
            div.dataset.filename = slide.filename || '';
            div.dataset.text = slide.text || '';
            div.dataset.duration = slide.duration || DEFAULT_DURATION;

            const typeLabels = {
                'image': '🖼 Фото', 
                'text': '📝 Текст', 
                'schedule': '📅 Расписание'
            };
            const typeLabel = typeLabels[slide.type] || slide.type;

            let preview = '';
            
            if (slide.type === 'image' && slide.filename) {
                const imgUrl = `https://alexdrog.github.io/bot-webapp/slides/${slide.filename}`;
                preview = `
                    <div class="preview-container">
                        <img class="slide-preview" 
                             src="${imgUrl}" 
                             onerror="this.parentElement.innerHTML='<div class=\\'image-fallback\\'>🖼<br>Ошибка загрузки</div>'" 
                             loading="lazy"
                             alt="Slide ${index + 1}">
                    </div>`;
            } else if (slide.type === 'schedule') {
                preview = `
                    <div class="slide-schedule">
                        <div style="font-size:48px">📅</div>
                        <div style="font-size:14px;margin-top:5px;">РАСПИСАНИЕ</div>
                    </div>`;
            } else {
                const text = slide.text || 'Без текста';
                preview = `<div class="slide-text">${escapeHtml(text)}</div>`;
            }

            const dur = slide.duration;

            div.innerHTML = `
                <div class="slide-number">${index + 1}</div>
                <div class="slide-type-badge">${typeLabel}</div>
                <button class="delete-btn" data-index="${index}" title="Удалить слайд">×</button>
                ${preview}
                <div class="controls-panel">
                    <div class="duration-row">
                        <span>Время показа:</span>
                        <span class="duration-current" id="dur-disp-${index}">${dur}с</span>
                    </div>
                    <div class="duration-buttons">
                        <button class="btn-dur" data-action="decrement" data-index="${index}">−</button>
                        <input type="number" 
                               class="duration-input" 
                               id="dur-inp-${index}" 
                               value="${dur}" 
                               min="${MIN_DURATION}" 
                               max="${MAX_DURATION}" 
                               data-index="${index}">
                        <button class="btn-dur" data-action="increment" data-index="${index}">+</button>
                    </div>
                    <div class="quick-times">
                        <button class="quick-btn ${dur===5?'active':''}" data-duration="5" data-index="${index}">5с</button>
                        <button class="quick-btn ${dur===10?'active':''}" data-duration="10" data-index="${index}">10с</button>
                        <button class="quick-btn ${dur===15?'active':''}" data-duration="15" data-index="${index}">15с</button>
                        <button class="quick-btn ${dur===30?'active':''}" data-duration="30" data-index="${index}">30с</button>
                        <button class="quick-btn ${dur===60?'active':''}" data-duration="60" data-index="${index}">1м</button>
                    </div>
                </div>
            `;

            attachSlideEventListeners(div, index);
            
            return div;
        }

        // Прикрепление обработчиков
        function attachSlideEventListeners(element, index) {
            const deleteBtn = element.querySelector('.delete-btn');
            if (deleteBtn) {
                deleteBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteSlide(index);
                });
            }

            element.querySelectorAll('.btn-dur').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const action = btn.dataset.action;
                    const idx = parseInt(btn.dataset.index);
                    const delta = action === 'increment' ? 5 : -5;
                    changeDuration(idx, delta);
                });
            });

            const input = element.querySelector('.duration-input');
            if (input) {
                input.addEventListener('change', (e) => {
                    const idx = parseInt(e.target.dataset.index);
                    updateDuration(idx, parseInt(e.target.value));
                });
                
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.target.blur();
                    }
                });
            }

            element.querySelectorAll('.quick-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const idx = parseInt(btn.dataset.index);
                    const dur = parseInt(btn.dataset.duration);
                    setQuickDuration(idx, dur);
                });
            });
        }

        function changeDuration(idx, delta) {
            const slide = slides[idx];
            if (!slide) return;
            
            const newVal = slide.duration + delta;
            updateDuration(idx, newVal);
        }

        function setQuickDuration(idx, val) {
            updateDuration(idx, val);
        }

        function updateDuration(idx, val) {
            const slide = slides[idx];
            if (!slide) return;
            
            let v = parseInt(val);
            if (isNaN(v)) v = DEFAULT_DURATION;
            v = Math.min(MAX_DURATION, Math.max(MIN_DURATION, v));
            
            slide.duration = v;
            
            const item = document.querySelector(`.slide-item[data-index="${idx}"]`);
            if (item) {
                item.dataset.duration = v;
            }
            
            const inp = document.getElementById(`dur-inp-${idx}`);
            const disp = document.getElementById(`dur-disp-${idx}`);
            if (inp) inp.value = v;
            if (disp) disp.textContent = v + 'с';
            
            if (item) {
                item.querySelectorAll('.quick-btn').forEach(b => {
                    b.classList.remove('active');
                    const btnDur = parseInt(b.dataset.duration);
                    if (btnDur === v) b.classList.add('active');
                });
            }
        }

        function deleteSlide(idx) {
            if (idx < 0 || idx >= slides.length) return;
            
            tg.showConfirm(`Удалить слайд #${idx + 1}?`, (confirmed) => {
                if (confirmed) {
                    slides.splice(idx, 1);
                    render();
                    updateStatus(`Слайдов: ${slides.length} (тащите для сортировки)`);
                }
            });
        }

        function render() {
            const container = document.getElementById('slidesContainer');
            
            if (slides.length === 0) {
                container.innerHTML = '<div class="empty-state">✨ Нет слайдов<br><span style="font-size:12px;">Добавьте слайды через бот</span></div>';
                if (sortableInstance) {
                    sortableInstance.destroy();
                    sortableInstance = null;
                }
                return;
            }

            container.innerHTML = '';
            slides.forEach((slide, index) => {
                const item = createSlideElement(slide, index);
                container.appendChild(item);
            });

            if (sortableInstance) {
                sortableInstance.destroy();
            }

            sortableInstance = new Sortable(container, {
                animation: 150,
                delay: 100,
                delayOnTouchOnly: true,
                ghostClass: 'sortable-ghost',
                dragClass: 'sortable-drag',
                handle: '.slide-item',
                onEnd: function(evt) {
                    const oldIndex = evt.oldIndex;
                    const newIndex = evt.newIndex;
                    
                    if (oldIndex !== newIndex && oldIndex !== undefined && newIndex !== undefined) {
                        const movedItem = slides.splice(oldIndex, 1)[0];
                        slides.splice(newIndex, 0, movedItem);
                        render();
                    }
                }
            });
        }

        function cancelAndClose() {
            if (slides.length > 0) {
                tg.showConfirm('Все несохранённые изменения будут потеряны. Выйти?', (confirmed) => {
                    if (confirmed) {
                        tg.close();
                    }
                });
            } else {
                tg.close();
            }
        }

        // === НОВЫЙ МЕТОД СОХРАНЕНИЯ ЧЕРЕЗ DEEP LINK ===
        function saveAndClose() {
            if (isSaving) return;
            
            isSaving = true;
            document.getElementById('savingOverlay').classList.add('active');
            document.getElementById('saveBtn').disabled = true;
            
            // Собираем актуальные данные из DOM
            const items = document.querySelectorAll('.slide-item');
            const finalSlides = [];
            
            items.forEach((item) => {
                const type = item.dataset.type || 'text';
                const filename = item.dataset.filename || null;
                const text = item.dataset.text || '';
                const duration = parseInt(item.dataset.duration) || DEFAULT_DURATION;
                
                // Для schedule берем structure из оригинального массива slides по индексу
                const originalIndex = Array.from(items).indexOf(item);
                const structure = slides[originalIndex]?.structure || null;
                
                finalSlides.push({
                    type: type,
                    filename: filename,
                    text: text,
                    duration: duration,
                    structure: structure
                });
            });
            
            console.log('Saving slides:', finalSlides);
            
            try {
                // Кодируем данные в compact base64
                const encoded = encodeBase64ForURL(finalSlides);
                
                // Формируем deep link
                // Формат: tg://start?startgroup=carousel_<base64>
                const deepLink = `tg://resolve?domain=${botUsername}&start=carousel_${encoded}`;
                
                console.log('Opening deep link:', deepLink.substring(0, 100) + '...');
                
                // Показываем инструкцию и открываем ссылку
                tg.showPopup({
                    title: 'Сохранение',
                    message: 'Нажмите "Открыть", чтобы сохранить изменения в боте.',
                    buttons: [
                        {id: 'open', type: 'default', text: 'Открыть бот'},
                        {id: 'cancel', type: 'cancel', text: 'Отмена'}
                    ]
                }, (buttonId) => {
                    if (buttonId === 'open') {
                        // Открываем deep link
                        window.location.href = deepLink;
                        
                        // Закрываем WebApp через небольшую задержку
                        setTimeout(() => {
                            tg.close();
                        }, 1000);
                    } else {
                        // Отмена - разблокируем UI
                        isSaving = false;
                        document.getElementById('savingOverlay').classList.remove('active');
                        document.getElementById('saveBtn').disabled = false;
                    }
                });
                
            } catch (e) {
                console.error('Save error:', e);
                isSaving = false;
                document.getElementById('savingOverlay').classList.remove('active');
                document.getElementById('saveBtn').disabled = false;
                
                tg.showAlert('Ошибка сохранения: ' + e.message);
            }
        }

        // Глобальные функции
        window.cancelAndClose = cancelAndClose;
        window.saveAndClose = saveAndClose;
        window.deleteSlide = deleteSlide;
        window.updateDuration = updateDuration;
        window.setQuickDuration = setQuickDuration;
        window.changeDuration = changeDuration;

        // Загрузка при старте
        loadSlides();

    })();
</script>
</body>
</html>
