<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Редактор карусели</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: white;
            padding: 10px;
            padding-bottom: 120px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .header {
            text-align: center;
            margin-bottom: 15px;
            position: sticky;
            top: 0;
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
            padding: 10px;
            border-radius: 12px;
            z-index: 50;
            border: 1px solid rgba(102, 126, 234, 0.3);
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            font-size: 11px;
            color: #8b92a8;
            margin-top: 5px;
        }

        .slides-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .slide-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
            cursor: grab;
            position: relative;
            touch-action: pan-y;
        }

        .slide-item.sortable-ghost {
            opacity: 0.4;
            background: rgba(102, 126, 234, 0.2);
        }

        .preview-container {
            width: 100%;
            height: 140px;
            position: relative;
            background: linear-gradient(135deg, #1a1a2e 0%, #2d2d44 100%);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
        }

        .slide-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .image-fallback {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2d2d44 0%, #1a1a2e 100%);
            color: #667eea;
            padding: 15px;
        }

        .slide-text {
            width: 100%;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-size: 16px;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            word-break: break-word;
        }

        .slide-schedule {
            width: 100%;
            height: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2d3561 0%, #1e2746 100%);
        }

        .slide-number {
            position: absolute;
            top: 8px;
            left: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: bold;
            z-index: 10;
        }

        .slide-type-badge {
            position: absolute;
            top: 8px;
            left: 42px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 10px;
            z-index: 10;
        }

        .delete-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #ff3b30;
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            z-index: 10;
        }

        .controls-panel {
            padding: 12px;
            background: rgba(0,0,0,0.3);
        }

        .duration-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 12px;
            color: #8b92a8;
        }

        .duration-current {
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
        }

        .duration-buttons {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
        }

        .btn-dur {
            background: rgba(102, 126, 234, 0.3);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
        }

        .duration-input {
            flex: 1;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 16px;
            text-align: center;
        }

        .quick-times {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .quick-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #aaa;
            padding: 6px 12px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
            flex: 1;
        }

        .quick-btn.active {
            background: rgba(102, 126, 234, 0.6);
            border-color: #667eea;
            color: white;
        }

        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(26, 26, 46, 0.98);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 12px 15px calc(12px + env(safe-area-inset-bottom));
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .saving-indicator {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 20px 30px;
            border-radius: 12px;
            display: none;
            z-index: 200;
        }

        .saving-indicator.active {
            display: block;
        }

        @media (min-width: 600px) {
            .slides-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="header">
        <h1>🎠 Редактор карусели</h1>
        <p id="statusText">Загрузка...</p>
    </div>

    <div id="slidesContainer" class="slides-grid"></div>

    <div class="footer">
        <button class="btn btn-secondary" onclick="cancelAndClose()">Отмена</button>
        <button class="btn btn-primary" id="saveBtn" onclick="saveAndClose()">💾 Сохранить</button>
    </div>

    <div class="saving-indicator" id="savingIndicator">
        <div>Сохранение...</div>
    </div>

<script>
    let tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // Устанавливаем цвет шапки
    tg.setHeaderColor('#1a1a2e');
    tg.setBackgroundColor('#1a1a2e');

    let slides = [];
    let sortableInstance = null;

    // ИСПРАВЛЕННОЕ декодирование Base64 - соответствует боту (urllib.parse.quote)
    function decodeBase64FromURL(urlData) {
        try {
            // URL decode сначала (бот использует quote)
            let decoded = decodeURIComponent(urlData);

            // Добавляем padding если нужно
            while (decoded.length % 4) {
                decoded += '=';
            }

            // Стандартное base64 decode (бот использует base64.b64encode, не base64url)
            const jsonStr = atob(decoded);
            return JSON.parse(jsonStr);
        } catch (e) {
            console.error('Decode error:', e);
            throw new Error('Ошибка декодирования данных: ' + e.message);
        }
    }

    function loadSlides() {
        try {
            const params = new URLSearchParams(window.location.search);
            const data = params.get('data');

            if (!data) {
                document.getElementById('statusText').textContent = 'Нет данных - пустая карусель';
                slides = [];
                render();
                return;
            }

            const rawSlides = decodeBase64FromURL(data);

            // Нормализуем данные
            slides = rawSlides.map((s, i) => ({
                type: s.type || 'text',
                duration: parseInt(s.duration) || 10,
                filename: s.filename || null,
                text: s.text || '',
                structure: s.structure || null
            }));

            render();

        } catch (e) {
            console.error('Load error:', e);
            document.getElementById('statusText').textContent = 'Ошибка: ' + e.message;
            tg.showAlert('Ошибка загрузки: ' + e.message);
        }
    }

    function render() {
        const container = document.getElementById('slidesContainer');
        document.getElementById('statusText').textContent = `Слайдов: ${slides.length} (тащите за край для сортировки)`;

        container.innerHTML = '';

        if (slides.length === 0) {
            container.innerHTML = '<div style="text-align:center;padding:40px;color:#8b92a8;">Нет слайдов. Добавьте через бот.</div>';
            return;
        }

        slides.forEach((slide, index) => {
            const item = createSlideElement(slide, index);
            container.appendChild(item);
        });

        // Инициализируем Sortable только если есть слайды
        if (sortableInstance) {
            sortableInstance.destroy();
        }

        sortableInstance = new Sortable(container, {
            animation: 150,
            delay: 100,
            delayOnTouchOnly: true,
            ghostClass: 'sortable-ghost',
            handle: '.slide-item', // Весь элемент является handle
            onEnd: function(evt) {
                // Обновляем порядок в массиве
                const itemEl = evt.item;
                const newIndex = evt.newIndex;
                const oldIndex = evt.oldIndex;

                // Перемещаем элемент в массиве
                const movedItem = slides.splice(oldIndex, 1)[0];
                slides.splice(newIndex, 0, movedItem);

                // Перерендериваем для обновления номеров
                render();
            }
        });
    }

    function createSlideElement(slide, index) {
        const div = document.createElement('div');
        div.className = 'slide-item';
        div.dataset.index = index;

        const typeLabels = {
            'image': '🖼 Фото', 
            'text': '📝 Текст', 
            'schedule': '📅 Расписание'
        };
        const typeLabel = typeLabels[slide.type] || slide.type;

        let preview = '';
        if (slide.type === 'image' && slide.filename) {
            const imgUrl = `https://alexdrog.github.io/bot-webapp/slides/${slide.filename}`;
            preview = `<div class="preview-container">
                <img class="slide-preview" src="${imgUrl}" onerror="this.parentElement.innerHTML='<div class=\'image-fallback\'>🖼<br>Ошибка загрузки</div>'" loading="lazy">
            </div>`;
        } else if (slide.type === 'schedule') {
            preview = `<div class="slide-schedule">
                <div style="font-size:48px">📅</div>
                <div style="font-size:14px;margin-top:5px;">РАСПИСАНИЕ</div>
            </div>`;
        } else {
            const text = slide.text || 'Без текста';
            preview = `<div class="slide-text">${escapeHtml(text)}</div>`;
        }

        const dur = slide.duration || 10;

        div.innerHTML = `
            <div class="slide-number">${index + 1}</div>
            <div class="slide-type-badge">${typeLabel}</div>
            <button class="delete-btn" onclick="deleteSlide(${index})" title="Удалить">×</button>
            ${preview}
            <div class="controls-panel">
                <div class="duration-row">
                    <span>Время показа:</span>
                    <span class="duration-current" id="dur-disp-${index}">${dur}с</span>
                </div>
                <div class="duration-buttons">
                    <button class="btn-dur" onclick="changeDur(${index}, -5)">−</button>
                    <input type="number" class="duration-input" id="dur-inp-${index}" value="${dur}" min="1" max="300" onchange="updateDuration(${index}, this.value)">
                    <button class="btn-dur" onclick="changeDur(${index}, 5)">+</button>
                </div>
                <div class="quick-times">
                    <button class="quick-btn ${dur===5?'active':''}" onclick="setQuickDur(${index}, 5)">5с</button>
                    <button class="quick-btn ${dur===10?'active':''}" onclick="setQuickDur(${index}, 10)">10с</button>
                    <button class="quick-btn ${dur===15?'active':''}" onclick="setQuickDur(${index}, 15)">15с</button>
                    <button class="quick-btn ${dur===30?'active':''}" onclick="setQuickDur(${index}, 30)">30с</button>
                    <button class="quick-btn ${dur===60?'active':''}" onclick="setQuickDur(${index}, 60)">1м</button>
                </div>
            </div>
        `;

        return div;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function changeDur(idx, delta) {
        const inp = document.getElementById(`dur-inp-${idx}`);
        if (inp) {
            const newVal = parseInt(inp.value) + delta;
            updateDuration(idx, newVal);
        }
    }

    function setQuickDur(idx, val) {
        updateDuration(idx, val);
    }

    function updateDuration(idx, val) {
        let v = parseInt(val);
        if (isNaN(v) || v < 1) v = 1;
        if (v > 300) v = 300;

        slides[idx].duration = v;

        const inp = document.getElementById(`dur-inp-${idx}`);
        const disp = document.getElementById(`dur-disp-${idx}`);
        if (inp) inp.value = v;
        if (disp) disp.textContent = v + 'с';

        // Обновляем активные кнопки
        const item = document.querySelector(`[data-index="${idx}"]`);
        if (item) {
            item.querySelectorAll('.quick-btn').forEach(b => {
                b.classList.remove('active');
                const btnText = b.textContent;
                const btnVal = btnText.includes('м') ? 60 : parseInt(btnText);
                if (btnVal === v) b.classList.add('active');
            });
        }
    }

    function deleteSlide(idx) {
        if (confirm('Удалить слайд #' + (idx + 1) + '?')) {
            slides.splice(idx, 1);
            render();
        }
    }

    function cancelAndClose() {
        tg.close();
    }

    // ИСПРАВЛЕННАЯ функция сохранения
    function saveAndClose() {
        const saveBtn = document.getElementById('saveBtn');
        const indicator = document.getElementById('savingIndicator');

        // Блокируем кнопку
        saveBtn.disabled = true;
        indicator.classList.add('active');

        try {
            // Собираем финальные данные из текущего состояния slides
            const finalSlides = slides.map((slide, idx) => {
                // Получаем актуальное значение duration из input
                const inp = document.getElementById(`dur-inp-${idx}`);
                const duration = inp ? parseInt(inp.value) || 10 : slide.duration;

                return {
                    type: slide.type,
                    filename: slide.filename,
                    text: slide.text || '',
                    duration: duration,
                    structure: slide.structure
                };
            });

            // Фильтруем невалидные слайды
            const validSlides = finalSlides.filter(s => {
                if (s.type === 'image' && !s.filename) return false;
                return true;
            });

            const data = {
                action: 'carousel_update',
                slides: validSlides
            };

            const jsonData = JSON.stringify(data);
            console.log('Sending data:', jsonData);

            // Проверяем, что WebApp открыт через кнопку (sendData доступен)
            if (!tg.initDataUnsafe.query_id) {
                console.warn('WebApp не открыт через web_app кнопку - sendData может не работать');
            }

            // Отправляем данные
            tg.sendData(jsonData);

            // ВАЖНО: Закрываем ПОСЛЕ отправки данных с задержкой
            // Это критично для работы на всех платформах [^1^][^2^]
            setTimeout(() => {
                tg.close();
            }, 500);

        } catch (e) {
            console.error('Save error:', e);
            indicator.classList.remove('active');
            saveBtn.disabled = false;
            tg.showAlert('Ошибка сохранения: ' + e.message);
        }
    }

    // Обработка события mainButton (если настроена)
    tg.onEvent('mainButtonClicked', function() {
        saveAndClose();
    });

    // Загружаем данные при старте
    loadSlides();
</script>
</body>
</html>
