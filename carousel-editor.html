<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Редактор карусели</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: white;
            padding: 10px;
            padding-bottom: 120px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .header {
            text-align: center;
            margin-bottom: 15px;
            position: sticky;
            top: 0;
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
            padding: 10px;
            border-radius: 12px;
            z-index: 50;
            border: 1px solid rgba(102, 126, 234, 0.3);
        }
        
        .header h1 {
            font-size: 18px;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header p {
            font-size: 11px;
            color: #8b92a8;
            margin-top: 5px;
        }
        
        .slides-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .slide-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
            cursor: grab;
            position: relative;
            touch-action: pan-y;
        }
        
        .slide-item.sortable-ghost {
            opacity: 0.4;
            background: rgba(102, 126, 234, 0.2);
        }
        
        /* ПРЕВЬЮШКА КОНТЕЙНЕР */
        .preview-container {
            width: 100%;
            height: 140px;
            position: relative;
            background: linear-gradient(135deg, #1a1a2e 0%, #2d2d44 100%);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
        }
        
        .slide-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: opacity 0.3s;
        }
        
        .slide-preview.loading {
            opacity: 0;
        }
        
        .slide-preview.loaded {
            opacity: 1;
        }
        
        .slide-preview.error {
            display: none;
        }
        
        /* ЗАГЛУШКА КОГДА НЕТ КАРТИНКИ */
        .image-fallback {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2d2d44 0%, #1a1a2e 100%);
            color: #667eea;
            padding: 15px;
        }
        
        .image-fallback-icon {
            font-size: 48px;
            margin-bottom: 8px;
            opacity: 0.8;
        }
        
        .image-fallback-name {
            font-size: 11px;
            color: #888;
            text-align: center;
            word-break: break-all;
            max-width: 100%;
            line-height: 1.3;
        }
        
        .image-fallback-url {
            font-size: 9px;
            color: #555;
            margin-top: 5px;
            text-align: center;
            word-break: break-all;
        }
        
        /* ТЕКСТОВЫЙ СЛАЙД */
        .slide-text {
            width: 100%;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-size: 16px;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            word-break: break-word;
            line-height: 1.4;
            font-weight: 500;
        }
        
        /* РАСПИСАНИЕ */
        .slide-schedule {
            width: 100%;
            height: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2d3561 0%, #1e2746 100%);
        }
        
        .slide-schedule-icon {
            font-size: 48px;
            margin-bottom: 5px;
        }
        
        .slide-schedule-label {
            font-size: 12px;
            color: #667eea;
            letter-spacing: 2px;
            font-weight: 600;
        }
        
        .slide-number {
            position: absolute;
            top: 8px;
            left: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: bold;
            border: 2px solid rgba(255,255,255,0.3);
            z-index: 10;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        
        .slide-type-badge {
            position: absolute;
            top: 8px;
            left: 42px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 10px;
            text-transform: uppercase;
            backdrop-filter: blur(4px);
            z-index: 10;
        }
        
        .delete-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #ff3b30;
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(255,59,48,0.3);
        }
        
        .delete-btn:active {
            transform: scale(0.9);
        }
        
        .debug-panel {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,59,48,0.3);
            color: #ff6b6b;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 8px;
            font-size: 11px;
            font-family: monospace;
            max-height: 150px;
            overflow-y: auto;
            display: none;
        }
        
        .debug-panel.visible {
            display: block;
        }
        
        .controls-panel {
            padding: 12px;
            background: rgba(0,0,0,0.3);
        }
        
        .duration-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 12px;
            color: #8b92a8;
        }
        
        .duration-current {
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
        }
        
        .duration-buttons {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
        }
        
        .btn-dur {
            background: rgba(102, 126, 234, 0.3);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
        }
        
        .btn-dur:active {
            background: rgba(102, 126, 234, 0.6);
            transform: scale(0.95);
        }
        
        .duration-input {
            flex: 1;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 16px;
            text-align: center;
        }
        
        .quick-times {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }
        
        .quick-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #aaa;
            padding: 6px 12px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
            flex: 1;
        }
        
        .quick-btn.active {
            background: rgba(102, 126, 234, 0.6);
            border-color: #667eea;
            color: white;
            font-weight: 600;
        }
        
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(26, 26, 46, 0.98);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 12px 15px calc(12px + env(safe-area-inset-bottom));
            display: flex;
            gap: 10px;
            z-index: 100;
        }
        
        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #8b92a8;
        }
        
        /* ПЛАНШЕТ */
        @media (min-width: 600px) {
            .slides-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
            
            .preview-container, .slide-text, .slide-schedule {
                height: 160px;
            }
        }
        
        /* ПК */
        @media (min-width: 1024px) {
            .slides-grid {
                grid-template-columns: repeat(3, 1fr);
                max-width: 1200px;
                margin: 0 auto;
            }
            
            .preview-container, .slide-text, .slide-schedule {
                height: 200px;
            }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🎠 Редактор карусели</h1>
    <p id="statusText">Загрузка...</p>
</div>

<div id="debugPanel" class="debug-panel"></div>

<div id="slidesContainer" class="slides-grid"></div>

<div id="emptyState" class="empty-state" style="display: none;">
    <div style="font-size: 60px; margin-bottom: 15px;">📭</div>
    <p>Нет слайдов для редактирования</p>
</div>

<div class="footer">
    <button class="btn btn-secondary" onclick="tg.close()">Отмена</button>
    <button class="btn btn-primary" onclick="saveAndClose()">💾 Сохранить</button>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    
    let slides = [];
    let imageErrors = [];
    
    function log(msg) {
        console.log(msg);
        const debug = document.getElementById('debugPanel');
        debug.innerHTML += msg + '<br>';
        debug.classList.add('visible');
    }
    
    function getImageUrl(filename) {
        if (!filename) return null;
        
        // Если уже полный URL
        if (filename.startsWith('http://') || filename.startsWith('https://')) {
            return filename;
        }
        
        // Определяем базовый URL
        const baseUrl = window.location.origin.includes('github.io') 
            ? 'https://alexdrog.github.io/bot-webapp'
            : (window.location.origin || '');
            
        return `${baseUrl}/slides/${filename}`;
    }
    
    function loadSlides() {
        try {
            const params = new URLSearchParams(window.location.search);
            const data = params.get('data');
            
            if (!data) {
                log('❌ Нет данных в URL параметре "data"');
                showEmpty();
                return;
            }
            
            // Декодирование Base64URL
            let padded = data;
            while (padded.length % 4) padded += '=';
            const standardBase64 = padded.replace(/-/g, '+').replace(/_/g, '/');
            const jsonStr = atob(standardBase64);
            
            log('📦 Данные получены: ' + jsonStr.length + ' байт');
            
            const rawSlides = JSON.parse(jsonStr);
            log(`📊 Слайдов: ${rawSlides.length}`);
            
            slides = rawSlides.map((s, i) => ({
                type: s.t || s.type || 'text',
                duration: s.d || s.duration || 10,
                filename: s.f || s.filename || null,
                text: s.x || s.text || '',
                structure: s.s || s.structure || null,
                id: i
            }));
            
            if (slides.length === 0) {
                showEmpty();
                return;
            }
            
            // Проверяем первый слайд
            const first = slides[0];
            log(`🔍 Слайд 0: тип=${first.type}, файл=${first.filename || 'нет'}`);
            
            render();
            
        } catch (e) {
            log('❌ ОШИБКА: ' + e.message);
            showEmpty();
        }
    }
    
    function showEmpty() {
        document.getElementById('slidesContainer').style.display = 'none';
        document.getElementById('emptyState').style.display = 'block';
        document.getElementById('statusText').textContent = 'Нет данных';
    }
    
    function render() {
        const container = document.getElementById('slidesContainer');
        const emptyState = document.getElementById('emptyState');
        const statusText = document.getElementById('statusText');
        
        if (slides.length === 0) {
            showEmpty();
            return;
        }
        
        container.innerHTML = '';
        container.style.display = window.innerWidth >= 600 ? 'grid' : 'flex';
        emptyState.style.display = 'none';
        statusText.textContent = `Слайдов: ${slides.length} | Ошибок загрузки: ${imageErrors.length}`;
        
        slides.forEach((slide, index) => {
            const item = createSlideElement(slide, index);
            container.appendChild(item);
        });
        
        // Инициализация Sortable
        new Sortable(container, {
            animation: 150,
            delay: 100,
            delayOnTouchOnly: true,
            ghostClass: 'sortable-ghost',
            onEnd: function(evt) {
                // Обновляем порядок
                const newSlides = [];
                const items = container.querySelectorAll('.slide-item');
                items.forEach((item, newIdx) => {
                    const oldIdx = parseInt(item.dataset.index);
                    const inp = item.querySelector('.duration-input');
                    const slide = {...slides[oldIdx]};
                    slide.duration = parseInt(inp?.value) || 10;
                    newSlides.push(slide);
                });
                slides = newSlides;
                render();
            }
        });
    }
    
    function createSlideElement(slide, index) {
        const div = document.createElement('div');
        div.className = 'slide-item';
        div.dataset.index = index;
        
        const typeLabel = {
            'image': '🖼 Фото',
            'text': '📝 Текст',
            'schedule': '📅 Расписание'
        }[slide.type] || slide.type;
        
        let previewContent = '';
        
        if (slide.type === 'image' && slide.filename) {
            const imgUrl = getImageUrl(slide.filename);
            log(`🖼 Слайд ${index + 1}: ${imgUrl}`);
            
            previewContent = `
                <div class="preview-container" id="preview-${index}">
                    <img class="slide-preview loading" 
                         src="${imgUrl}" 
                         alt="${slide.filename}"
                         onload="this.classList.remove('loading'); this.classList.add('loaded'); document.getElementById('fallback-${index}').style.display='none';"
                         onerror="this.style.display='none'; document.getElementById('fallback-${index}').style.display='flex'; log('❌ Ошибка загрузки: ${imgUrl}');">
                    <div class="image-fallback" id="fallback-${index}" style="display: none;">
                        <div class="image-fallback-icon">🖼</div>
                        <div class="image-fallback-name">${slide.filename}</div>
                        <div class="image-fallback-url">${imgUrl.substring(0, 30)}...</div>
                    </div>
                </div>
            `;
        } 
        else if (slide.type === 'schedule') {
            previewContent = `
                <div class="slide-schedule">
                    <div class="slide-schedule-icon">📅</div>
                    <div class="slide-schedule-label">РАСПИСАНИЕ</div>
                </div>
            `;
        } 
        else {
            const text = (slide.text || 'Без текста').substring(0, 100);
            previewContent = `<div class="slide-text">${escapeHtml(text)}</div>`;
        }
        
        const dur = slide.duration || 10;
        
        div.innerHTML = `
            <div class="slide-number">${index + 1}</div>
            <div class="slide-type-badge">${typeLabel}</div>
            <button class="delete-btn" onclick="deleteSlide(${index})" title="Удалить">×</button>
            ${previewContent}
            <div class="controls-panel">
                <div class="duration-row">
                    <span>Время показа:</span>
                    <span class="duration-current" id="dur-disp-${index}">${dur}с</span>
                </div>
                <div class="duration-buttons">
                    <button class="btn-dur" onclick="changeDur(${index}, -5)">−</button>
                    <input type="number" class="duration-input" id="dur-inp-${index}" 
                           value="${dur}" min="1" max="300"
                           onchange="setDur(${index}, this.value)">
                    <button class="btn-dur" onclick="changeDur(${index}, 5)">+</button>
                </div>
                <div class="quick-times">
                    <button class="quick-btn ${dur===5?'active':''}" onclick="setDur(${index}, 5)">5с</button>
                    <button class="quick-btn ${dur===10?'active':''}" onclick="setDur(${index}, 10)">10с</button>
                    <button class="quick-btn ${dur===15?'active':''}" onclick="setDur(${index}, 15)">15с</button>
                    <button class="quick-btn ${dur===30?'active':''}" onclick="setDur(${index}, 30)">30с</button>
                    <button class="quick-btn ${dur===60?'active':''}" onclick="setDur(${index}, 60)">1м</button>
                </div>
            </div>
        `;
        
        return div;
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function changeDur(idx, delta) {
        const inp = document.getElementById(`dur-inp-${idx}`);
        if (inp) setDur(idx, parseInt(inp.value) + delta);
    }
    
    function setDur(idx, val) {
        let v = parseInt(val);
        if (isNaN(v) || v < 1) v = 1;
        if (v > 300) v = 300;
        
        slides[idx].duration = v;
        
        const inp = document.getElementById(`dur-inp-${idx}`);
        const disp = document.getElementById(`dur-disp-${idx}`);
        if (inp) inp.value = v;
        if (disp) disp.textContent = v + 'с';
        
        // Обновляем активную кнопку
        const item = document.querySelector(`[data-index="${idx}"]`);
        if (item) {
            const btns = item.querySelectorAll('.quick-btn');
            btns.forEach(b => {
                b.classList.remove('active');
                const btnVal = b.textContent.includes('м') ? 60 : parseInt(b.textContent);
                if (btnVal === v) b.classList.add('active');
            });
        }
    }
    
    function deleteSlide(idx) {
        if (confirm('Удалить слайд #' + (idx + 1) + '?')) {
            slides.splice(idx, 1);
            render();
        }
    }
    
    function saveAndClose() {
    const items = document.querySelectorAll('.slide-item');
    const finalSlides = [];
    
    items.forEach((item, idx) => {
        // Читаем ВСЕ данные прямо из DOM/input
        const typeBadge = item.querySelector('.slide-type-badge')?.textContent || '';
        const type = typeBadge.includes('Фото') ? 'image' : 
                     typeBadge.includes('Расписание') ? 'schedule' : 'text';
        
        const inp = item.querySelector('.duration-input');
        const duration = parseInt(inp?.value) || 10;
        
        // Для текста берём из preview
        let text = '';
        const textPreview = item.querySelector('.slide-text');
        if (textPreview) {
            text = textPreview.textContent;
        }
        
        // Для изображения - filename из dataset или img src
        let filename = null;
        const img = item.querySelector('.slide-preview');
        if (img) {
            const src = img.src;
            filename = src.split('/').pop();  // вытаскиваем имя файла из URL
        }
        
        finalSlides.push({
            type: type,
            filename: filename,
            text: text,
            duration: duration,
            order: idx
        });
    });
    
    const data = {
        action: 'carousel_update',
        slides: finalSlides
    };
    
    console.log('Отправляем:', data);  // для отладки
    tg.sendData(JSON.stringify(data));
    tg.close();
}
        });
        
        const data = {
            action: 'carousel_update',
            slides: finalSlides.map(s => ({
                type: s.type,
                filename: s.filename,
                text: s.text || '',
                duration: s.duration,
                structure: s.structure,
                order: s.order
            }))
        };
        
        tg.sendData(JSON.stringify(data));
        tg.close();
    }
    
    // Загрузка при старте
    loadSlides();
    
    // Обновление при изменении размера
    window.addEventListener('resize', () => {
        const container = document.getElementById('slidesContainer');
        if (slides.length > 0) {
            container.style.display = window.innerWidth >= 600 ? 'grid' : 'flex';
        }
    });
</script>

</body>
</html>
