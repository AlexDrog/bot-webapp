<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Редактор карусели</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #1a1a2e);
            color: var(--tg-theme-text-color, white);
            min-height: 100vh;
            padding: 10px;
            padding-bottom: 120px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .header {
            text-align: center;
            margin-bottom: 15px;
            position: sticky;
            top: 0;
            background: var(--tg-theme-secondary-bg-color, rgba(26, 26, 46, 0.95));
            backdrop-filter: blur(10px);
            padding: 10px;
            border-radius: 12px;
            z-index: 50;
            border: 1px solid rgba(102, 126, 234, 0.3);
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            font-size: 11px;
            color: var(--tg-theme-hint-color, #8b92a8);
            margin-top: 5px;
        }

        .slides-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .slide-item {
            background: var(--tg-theme-secondary-bg-color, rgba(255, 255, 255, 0.05));
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
            cursor: grab;
            position: relative;
            touch-action: pan-y;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .slide-item:active {
            cursor: grabbing;
        }

        .slide-item.sortable-ghost {
            opacity: 0.4;
            background: rgba(102, 126, 234, 0.2);
        }

        .slide-item.sortable-drag {
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transform: scale(1.02);
        }

        .preview-container {
            width: 100%;
            height: 140px;
            position: relative;
            background: linear-gradient(135deg, #1a1a2e 0%, #2d2d44 100%);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
        }

        .slide-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .image-fallback {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2d2d44 0%, #1a1a2e 100%);
            color: #667eea;
            padding: 15px;
        }

        .slide-text {
            width: 100%;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-size: 16px;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            word-break: break-word;
        }

        .slide-schedule {
            width: 100%;
            height: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2d3561 0%, #1e2746 100%);
        }

        .slide-number {
            position: absolute;
            top: 8px;
            left: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: bold;
            z-index: 10;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .slide-type-badge {
            position: absolute;
            top: 8px;
            left: 42px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            color: white;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 10px;
            z-index: 10;
        }

        .delete-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #ff3b30;
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            transition: transform 0.2s, background 0.2s;
        }

        .delete-btn:hover {
            background: #ff1a1a;
            transform: scale(1.05);
        }

        .delete-btn:active {
            transform: scale(0.95);
        }

        .controls-panel {
            padding: 12px;
            background: rgba(0,0,0,0.3);
        }

        .duration-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 12px;
            color: var(--tg-theme-hint-color, #8b92a8);
        }

        .duration-current {
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
        }

        .duration-buttons {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
        }

        .btn-dur {
            background: rgba(102, 126, 234, 0.3);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            transition: background 0.2s;
        }

        .btn-dur:hover {
            background: rgba(102, 126, 234, 0.5);
        }

        .btn-dur:active {
            background: rgba(102, 126, 234, 0.7);
        }

        .duration-input {
            flex: 1;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 16px;
            text-align: center;
        }

        .quick-times {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .quick-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #aaa;
            padding: 6px 12px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
            flex: 1;
            transition: all 0.2s;
        }

        .quick-btn:hover {
            background: rgba(255,255,255,0.15);
        }

        .quick-btn.active {
            background: rgba(102, 126, 234, 0.6);
            border-color: #667eea;
            color: white;
        }

        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--tg-theme-secondary-bg-color, rgba(26, 26, 46, 0.98));
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 12px 15px calc(12px + env(safe-area-inset-bottom));
            display: flex;
            gap: 10px;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-secondary {
            background: var(--tg-theme-button-color, rgba(255,255,255,0.1));
            color: var(--tg-theme-button-text-color, white);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .saving-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
            backdrop-filter: blur(5px);
        }

        .saving-overlay.active {
            display: flex;
        }

        .saving-indicator {
            background: var(--tg-theme-secondary-bg-color, rgba(26, 26, 46, 0.98));
            padding: 20px 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .saving-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(102, 126, 234, 0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--tg-theme-hint-color, #8b92a8);
        }

        .error-message {
            background: rgba(255, 59, 48, 0.2);
            border: 1px solid #ff3b30;
            color: #ff3b30;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            font-size: 14px;
        }

        @media (min-width: 600px) {
            .slides-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎠 Редактор карусели</h1>
        <p id="statusText">Загрузка...</p>
    </div>

    <div id="slidesContainer" class="slides-grid"></div>

    <div class="footer">
        <button class="btn btn-secondary" onclick="cancelAndClose()">Отмена</button>
        <button class="btn btn-primary" id="saveBtn" onclick="saveAndClose()">💾 Сохранить</button>
    </div>

    <div class="saving-overlay" id="savingOverlay">
        <div class="saving-indicator">
            <div class="saving-spinner"></div>
            <div>Сохранение изменений...</div>
            <div style="font-size: 12px; color: #8b92a8; margin-top: 5px;">Пожалуйста, подождите</div>
        </div>
    </div>

<script>
    (function() {
        'use strict';

        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        
        // Проверка инициализации
        if (!tg) {
            document.body.innerHTML = '<div class="error-message">Ошибка: Telegram WebApp API не загружен</div>';
            return;
        }

        tg.ready();
        tg.expand();

        // Применяем тему Telegram
        const applyTheme = () => {
            document.body.style.backgroundColor = tg.backgroundColor || '#1a1a2e';
            document.body.style.color = tg.textColor || 'white';
            
            if (tg.headerColor) {
                tg.setHeaderColor(tg.headerColor);
            }
        };
        
        applyTheme();
        
        // Слушаем изменения темы
        tg.onEvent('themeChanged', applyTheme);

        // Состояние приложения
        let slides = [];
        let sortableInstance = null;
        let isSaving = false;

        // Константы
        const MIN_DURATION = 1;
        const MAX_DURATION = 300;
        const DEFAULT_DURATION = 10;

        // Утилита для безопасного декодирования Base64 из URL
        function decodeBase64FromURL(urlData) {
            try {
                // URL decode
                let decoded = decodeURIComponent(urlData);
                
                // Добавляем padding если нужно
                while (decoded.length % 4) {
                    decoded += '=';
                }
                
                // Стандартное base64 decode
                const jsonStr = atob(decoded);
                return JSON.parse(jsonStr);
            } catch (e) {
                console.error('Decode error:', e);
                throw new Error(`Ошибка декодирования данных: ${e.message}`);
            }
        }

        // Нормализация слайда
        function normalizeSlide(slide, index) {
            return {
                type: slide.type || 'text',
                duration: Math.min(MAX_DURATION, Math.max(MIN_DURATION, 
                    parseInt(slide.duration) || DEFAULT_DURATION)),
                filename: slide.filename || null,
                text: slide.text || '',
                structure: slide.structure || null
            };
        }

        // Загрузка слайдов
        function loadSlides() {
            try {
                const params = new URLSearchParams(window.location.search);
                const data = params.get('data');

                if (!data) {
                    updateStatus('Нет данных - пустая карусель');
                    slides = [];
                    render();
                    return;
                }

                const rawSlides = decodeBase64FromURL(data);
                
                if (!Array.isArray(rawSlides)) {
                    throw new Error('Неверный формат данных');
                }

                slides = rawSlides.map((s, i) => normalizeSlide(s, i));
                
                updateStatus(`Слайдов: ${slides.length} (тащите для сортировки)`);
                render();

            } catch (e) {
                console.error('Load error:', e);
                updateStatus(`Ошибка: ${e.message}`);
                showError(`Ошибка загрузки: ${e.message}`);
                slides = [];
                render();
            }
        }

        // Обновление статуса
        function updateStatus(text) {
            const statusEl = document.getElementById('statusText');
            if (statusEl) {
                statusEl.textContent = text;
            }
        }

        // Показ ошибки
        function showError(message) {
            const container = document.getElementById('slidesContainer');
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.textContent = message;
            container.insertBefore(errorDiv, container.firstChild);
            
            setTimeout(() => errorDiv.remove(), 5000);
        }

        // Экранирование HTML
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Создание элемента слайда
        function createSlideElement(slide, index) {
            const div = document.createElement('div');
            div.className = 'slide-item';
            div.dataset.index = index;

            const typeLabels = {
                'image': '🖼 Фото', 
                'text': '📝 Текст', 
                'schedule': '📅 Расписание'
            };
            const typeLabel = typeLabels[slide.type] || slide.type;

            let preview = '';
            
            if (slide.type === 'image' && slide.filename) {
                const imgUrl = `https://alexdrog.github.io/bot-webapp/slides/${slide.filename}`;
                preview = `
                    <div class="preview-container">
                        <img class="slide-preview" 
                             src="${imgUrl}" 
                             onerror="this.parentElement.innerHTML='<div class=\\'image-fallback\\'>🖼<br>Ошибка загрузки</div>'" 
                             loading="lazy"
                             alt="Slide ${index + 1}">
                    </div>`;
            } else if (slide.type === 'schedule') {
                preview = `
                    <div class="slide-schedule">
                        <div style="font-size:48px">📅</div>
                        <div style="font-size:14px;margin-top:5px;">РАСПИСАНИЕ</div>
                    </div>`;
            } else {
                const text = slide.text || 'Без текста';
                preview = `<div class="slide-text">${escapeHtml(text)}</div>`;
            }

            const dur = slide.duration;

            div.innerHTML = `
                <div class="slide-number">${index + 1}</div>
                <div class="slide-type-badge">${typeLabel}</div>
                <button class="delete-btn" data-index="${index}" title="Удалить слайд">×</button>
                ${preview}
                <div class="controls-panel">
                    <div class="duration-row">
                        <span>Время показа:</span>
                        <span class="duration-current" id="dur-disp-${index}">${dur}с</span>
                    </div>
                    <div class="duration-buttons">
                        <button class="btn-dur" data-action="decrement" data-index="${index}">−</button>
                        <input type="number" 
                               class="duration-input" 
                               id="dur-inp-${index}" 
                               value="${dur}" 
                               min="${MIN_DURATION}" 
                               max="${MAX_DURATION}" 
                               data-index="${index}">
                        <button class="btn-dur" data-action="increment" data-index="${index}">+</button>
                    </div>
                    <div class="quick-times">
                        <button class="quick-btn ${dur===5?'active':''}" data-duration="5" data-index="${index}">5с</button>
                        <button class="quick-btn ${dur===10?'active':''}" data-duration="10" data-index="${index}">10с</button>
                        <button class="quick-btn ${dur===15?'active':''}" data-duration="15" data-index="${index}">15с</button>
                        <button class="quick-btn ${dur===30?'active':''}" data-duration="30" data-index="${index}">30с</button>
                        <button class="quick-btn ${dur===60?'active':''}" data-duration="60" data-index="${index}">1м</button>
                    </div>
                </div>
            `;

            // Добавляем обработчики событий
            attachSlideEventListeners(div, index);
            
            return div;
        }

        // Прикрепление обработчиков событий к слайду
        function attachSlideEventListeners(element, index) {
            // Кнопка удаления
            const deleteBtn = element.querySelector('.delete-btn');
            if (deleteBtn) {
                deleteBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteSlide(index);
                });
            }

            // Кнопки изменения длительности
            element.querySelectorAll('.btn-dur').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const action = btn.dataset.action;
                    const idx = parseInt(btn.dataset.index);
                    const delta = action === 'increment' ? 5 : -5;
                    changeDuration(idx, delta);
                });
            });

            // Input для длительности
            const input = element.querySelector('.duration-input');
            if (input) {
                input.addEventListener('change', (e) => {
                    const idx = parseInt(e.target.dataset.index);
                    updateDuration(idx, parseInt(e.target.value));
                });
                
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.target.blur();
                    }
                });
            }

            // Быстрые кнопки длительности
            element.querySelectorAll('.quick-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const idx = parseInt(btn.dataset.index);
                    const dur = parseInt(btn.dataset.duration);
                    setQuickDuration(idx, dur);
                });
            });
        }

        // Изменение длительности с дельтой
        function changeDuration(idx, delta) {
            const slide = slides[idx];
            if (!slide) return;
            
            const newVal = slide.duration + delta;
            updateDuration(idx, newVal);
        }

        // Установка быстрой длительности
        function setQuickDuration(idx, val) {
            updateDuration(idx, val);
        }

        // Обновление длительности слайда
        function updateDuration(idx, val) {
            const slide = slides[idx];
            if (!slide) return;
            
            let v = parseInt(val);
            if (isNaN(v)) v = DEFAULT_DURATION;
            v = Math.min(MAX_DURATION, Math.max(MIN_DURATION, v));
            
            slide.duration = v;
            
            // Обновляем UI
            const inp = document.getElementById(`dur-inp-${idx}`);
            const disp = document.getElementById(`dur-disp-${idx}`);
            if (inp) inp.value = v;
            if (disp) disp.textContent = v + 'с';
            
            // Обновляем активные кнопки
            const item = document.querySelector(`[data-index="${idx}"]`);
            if (item) {
                item.querySelectorAll('.quick-btn').forEach(b => {
                    b.classList.remove('active');
                    const btnDur = parseInt(b.dataset.duration);
                    if (btnDur === v) b.classList.add('active');
                });
            }
        }

        // Удаление слайда
        function deleteSlide(idx) {
            if (idx < 0 || idx >= slides.length) return;
            
            tg.showConfirm(`Удалить слайд #${idx + 1}?`, (confirmed) => {
                if (confirmed) {
                    slides.splice(idx, 1);
                    render();
                    updateStatus(`Слайдов: ${slides.length} (тащите для сортировки)`);
                }
            });
        }

        // Рендеринг всех слайдов
        function render() {
            const container = document.getElementById('slidesContainer');
            
            if (slides.length === 0) {
                container.innerHTML = '<div class="empty-state">✨ Нет слайдов<br><span style="font-size:12px;">Добавьте слайды через бот</span></div>';
                if (sortableInstance) {
                    sortableInstance.destroy();
                    sortableInstance = null;
                }
                return;
            }

            // Сохраняем текущие значения duration перед перерисовкой
            const currentDurations = slides.map(s => s.duration);
            
            container.innerHTML = '';
            slides.forEach((slide, index) => {
                const item = createSlideElement(slide, index);
                container.appendChild(item);
            });

            // Восстанавливаем длительности
            slides.forEach((slide, index) => {
                slide.duration = currentDurations[index];
            });

            // Инициализация Sortable
            if (sortableInstance) {
                sortableInstance.destroy();
            }

            sortableInstance = new Sortable(container, {
                animation: 150,
                delay: 100,
                delayOnTouchOnly: true,
                ghostClass: 'sortable-ghost',
                dragClass: 'sortable-drag',
                handle: '.slide-item',
                onEnd: function(evt) {
                    const oldIndex = evt.oldIndex;
                    const newIndex = evt.newIndex;
                    
                    if (oldIndex !== newIndex && oldIndex !== undefined && newIndex !== undefined) {
                        // Перемещаем элемент в массиве
                        const movedItem = slides.splice(oldIndex, 1)[0];
                        slides.splice(newIndex, 0, movedItem);
                        
                        // Перерендериваем для обновления номеров
                        render();
                    }
                }
            });
        }

        // Отмена и закрытие
        function cancelAndClose() {
            if (slides.length > 0) {
                tg.showConfirm('Все несохранённые изменения будут потеряны. Выйти?', (confirmed) => {
                    if (confirmed) {
                        tg.close();
                    }
                });
            } else {
                tg.close();
            }
        }

        // Сохранение и закрытие
        // Вместо редиректа:
// Вместо редиректа:
function saveAndClose() {
    const items = document.querySelectorAll('.slide-item');
    const slides = [];
    
    items.forEach(item => {
        slides.push({
            type: item.dataset.type,
            filename: item.dataset.filename,
            text: item.dataset.text || '',
            duration: parseInt(item.dataset.duration) || 10
        });
    });
    
    // Отправка данных в бот
    Telegram.WebApp.sendData(JSON.stringify({
        action: 'carousel_update',
        slides: slides
    }));
    
    Telegram.WebApp.close();
}
        // Обработка mainButton
        tg.onEvent('mainButtonClicked', saveAndClose);
        
        // Настройка MainButton если доступна
        if (tg.MainButton) {
            tg.MainButton.setText('💾 Сохранить');
            tg.MainButton.show();
            tg.MainButton.onClick(saveAndClose);
        }

        // Глобальные функции для HTML onclick
        window.cancelAndClose = cancelAndClose;
        window.saveAndClose = saveAndClose;
        window.deleteSlide = deleteSlide;
        window.updateDuration = updateDuration;
        window.setQuickDuration = setQuickDuration;
        window.changeDuration = changeDuration;

        // Загрузка при старте
        loadSlides();
        
        // Обработка beforeunload
        window.addEventListener('beforeunload', (e) => {
            if (slides.length > 0 && !isSaving) {
                e.preventDefault();
                e.returnValue = 'У вас есть несохранённые изменения. Вы уверены, что хотите уйти?';
            }
        });

    })();
</script>
</body>
</html>
