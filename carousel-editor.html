<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Редактор карусели</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: white;
            padding: 10px;
            padding-bottom: 120px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .header {
            text-align: center;
            margin-bottom: 15px;
            position: sticky;
            top: 0;
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
            padding: 10px;
            border-radius: 12px;
            z-index: 50;
            border: 1px solid rgba(102, 126, 234, 0.3);
        }
        
        .header h1 {
            font-size: 18px;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }
        
        .header p {
            font-size: 12px;
            color: #8b92a8;
        }
        
        .stats-bar {
            background: rgba(102, 126, 234, 0.15);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-around;
            font-size: 12px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            font-size: 11px;
            color: #8b92a8;
        }
        
        /* МОБИЛЬНАЯ ВЕРСИЯ - компактная */
        .slides-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .slide-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
            cursor: grab;
            position: relative;
            touch-action: pan-y;
        }
        
        .slide-item:active {
            cursor: grabbing;
            transform: scale(0.98);
            transition: transform 0.1s;
        }
        
        /* Компактное превью для телефона */
        .slide-preview {
            width: 100%;
            height: 120px;
            object-fit: cover;
            display: block;
            background: linear-gradient(135deg, #1a1a2e 0%, #2d2d44 100%);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .slide-text {
            width: 100%;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            font-size: 14px;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            word-break: break-word;
            line-height: 1.4;
        }
        
        .slide-schedule {
            width: 100%;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            background: linear-gradient(135deg, #2d3561 0%, #1e2746 100%);
            position: relative;
        }
        
        .slide-schedule::after {
            content: 'РАСПИСАНИЕ';
            font-size: 11px;
            position: absolute;
            bottom: 10px;
            color: #667eea;
            letter-spacing: 1px;
            font-weight: 600;
        }
        
        .slide-number {
            position: absolute;
            top: 8px;
            left: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: bold;
            border: 2px solid rgba(255,255,255,0.3);
            z-index: 10;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        
        .slide-type-badge {
            position: absolute;
            top: 8px;
            left: 42px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 10px;
            text-transform: uppercase;
            backdrop-filter: blur(4px);
        }
        
        .delete-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #ff3b30;
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(255,59,48,0.3);
        }
        
        .delete-btn:active {
            transform: scale(0.9);
            background: #ff2d55;
        }
        
        .controls-panel {
            padding: 10px;
            background: rgba(0,0,0,0.3);
        }
        
        .duration-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 12px;
            color: #8b92a8;
        }
        
        .duration-current {
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
        }
        
        .duration-buttons {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
        }
        
        .btn-dur {
            background: rgba(102, 126, 234, 0.3);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            touch-action: manipulation;
        }
        
        .btn-dur:active {
            background: rgba(102, 126, 234, 0.6);
            transform: scale(0.95);
        }
        
        .duration-input {
            flex: 1;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 8px;
            border-radius: 8px;
            font-size: 16px;
            text-align: center;
        }
        
        .quick-times {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }
        
        .quick-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #aaa;
            padding: 5px 10px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 11px;
            flex: 1;
            min-width: 45px;
            touch-action: manipulation;
        }
        
        .quick-btn:active {
            background: rgba(102, 126, 234, 0.4);
            transform: scale(0.95);
        }
        
        .quick-btn.active {
            background: rgba(102, 126, 234, 0.6);
            border-color: #667eea;
            color: white;
            font-weight: 600;
        }
        
        .slide-caption {
            padding: 6px 10px;
            font-size: 11px;
            color: #aaa;
            text-align: center;
            background: rgba(0,0,0,0.3);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(26, 26, 46, 0.98);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 12px 15px calc(12px + env(safe-area-inset-bottom));
            display: flex;
            gap: 10px;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            touch-action: manipulation;
        }
        
        .btn:active {
            transform: scale(0.98);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #8b92a8;
        }
        
        .empty-state-icon {
            font-size: 50px;
            margin-bottom: 10px;
        }
        
        .debug-info {
            background: rgba(255,0,0,0.1);
            border: 1px solid rgba(255,0,0,0.3);
            color: #ff6b6b;
            padding: 8px;
            margin-bottom: 10px;
            border-radius: 8px;
            font-size: 11px;
            font-family: monospace;
            word-break: break-all;
            max-height: 100px;
            overflow-y: auto;
        }
        
        .image-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #2d2d44 100%);
            color: #667eea;
        }
        
        .image-placeholder-icon {
            font-size: 40px;
            margin-bottom: 5px;
        }
        
        .image-placeholder-text {
            font-size: 10px;
            color: #666;
            padding: 0 10px;
            text-align: center;
            word-break: break-all;
        }
        
        /* ПЛАНШЕТ - 2 колонки */
        @media (min-width: 600px) {
            .slides-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
            
            .slide-preview, .slide-text, .slide-schedule {
                height: 150px;
            }
            
            .slide-text {
                font-size: 16px;
            }
        }
        
        /* ПК - 3 колонки, крупные превью */
        @media (min-width: 1024px) {
            body {
                padding: 20px;
                padding-bottom: 100px;
            }
            
            .header h1 {
                font-size: 24px;
            }
            
            .slides-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 20px;
                max-width: 1200px;
                margin: 0 auto;
            }
            
            .slide-preview, .slide-text, .slide-schedule {
                height: 200px;
            }
            
            .slide-number {
                width: 32px;
                height: 32px;
                font-size: 14px;
            }
            
            .controls-panel {
                padding: 15px;
            }
            
            .footer {
                position: sticky;
                bottom: 0;
                max-width: 1200px;
                margin: 0 auto;
                left: auto;
                right: auto;
                border-radius: 12px 12px 0 0;
            }
        }
        
        /* Горизонтальная ориентация на телефоне */
        @media (max-height: 500px) and (orientation: landscape) {
            .slide-preview, .slide-text, .slide-schedule {
                height: 80px;
            }
            
            .controls-panel {
                padding: 6px;
            }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🎠 Редактор карусели</h1>
    <p id="debugText">Загрузка...</p>
</div>

<div class="stats-bar">
    <div class="stat-item">
        <div class="stat-value" id="totalSlides">0</div>
        <div class="stat-label">слайдов</div>
    </div>
    <div class="stat-item">
        <div class="stat-value" id="totalTime">0с</div>
        <div class="stat-label">время</div>
    </div>
</div>

<div id="debugPanel" class="debug-info" style="display:none"></div>

<div id="slidesContainer" class="slides-grid"></div>

<div id="emptyState" class="empty-state" style="display: none;">
    <div class="empty-state-icon">📭</div>
    <p>Нет слайдов для редактирования</p>
    <p style="font-size: 12px; margin-top: 10px; opacity: 0.7;">Добавьте слайды в боте</p>
</div>

<div class="footer">
    <button class="btn btn-secondary" onclick="tg.close()">Отмена</button>
    <button class="btn btn-primary" onclick="saveAndClose()">💾 Сохранить</button>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    
    // Определяем URL сервера автоматически
    const SERVER_URL = (() => {
        if (window.location.origin && window.location.origin !== 'null') {
            return window.location.origin.replace(/\/[^/]*$/, '');
        }
        return '';
    })();
    
    let slides = [];
    const debugPanel = document.getElementById('debugPanel');
    const debugText = document.getElementById('debugText');
    
    function showDebug(msg) {
        console.log(msg);
        debugPanel.style.display = 'block';
        debugPanel.textContent += msg + '\n';
    }
    
    function loadSlides() {
        try {
            const params = new URLSearchParams(window.location.search);
            const data = params.get('data');
            
            showDebug('Data length: ' + (data ? data.length : 0));
            
            if (!data) {
                showDebug('Нет данных в URL!');
                slides = [];
                render();
                return;
            }
            
            let padded = data;
            while (padded.length % 4) padded += '=';
            const standardBase64 = padded.replace(/-/g, '+').replace(/_/g, '/');
            const jsonStr = atob(standardBase64);
            
            showDebug('JSON: ' + jsonStr.substring(0, 100) + '...');
            
            const rawSlides = JSON.parse(jsonStr);
            showDebug('Parsed: ' + rawSlides.length + ' items');
            
            slides = rawSlides.map((s, i) => {
                const slide = {
                    type: s.t || s.type || 'text',
                    duration: s.d || s.duration || 10,
                    filename: s.f || s.filename || null,
                    text: s.x || s.text || '',
                    structure: s.s || s.structure || null,
                    order: i
                };
                
                if (i === 0) {
                    showDebug(`Slide 0: type=${slide.type}, file=${slide.filename || 'none'}`);
                }
                
                return slide;
            });
            
            debugText.textContent = `Загружено: ${slides.length} слайдов`;
            
        } catch (e) {
            showDebug('ОШИБКА: ' + e.message);
            slides = [];
        }
        
        updateStats();
        render();
    }
    
    function updateStats() {
        const total = slides.length;
        const totalTime = slides.reduce((sum, s) => sum + (s.duration || 10), 0);
        
        document.getElementById('totalSlides').textContent = total;
        document.getElementById('totalTime').textContent = totalTime < 60 ? totalTime + 'с' : Math.round(totalTime/60) + 'м';
    }
    
    function render() {
        const container = document.getElementById('slidesContainer');
        const emptyState = document.getElementById('emptyState');
        
        if (slides.length === 0) {
            container.style.display = 'none';
            emptyState.style.display = 'block';
            return;
        }
        
        container.style.display = window.innerWidth >= 600 ? 'grid' : 'flex';
        emptyState.style.display = 'none';
        container.innerHTML = '';
        
        slides.forEach((slide, index) => {
            const item = createSlideElement(slide, index);
            container.appendChild(item);
        });
        
        // Sortable с поддержкой touch (задержка чтобы не мешать скроллу)
        new Sortable(container, {
            animation: 150,
            delay: 100,
            delayOnTouchOnly: true,
            touchStartThreshold: 5,
            onEnd: function() {
                updateOrder();
            }
        });
    }
    
    function createSlideElement(slide, index) {
        const div = document.createElement('div');
        div.className = 'slide-item';
        div.dataset.index = index;
        
        const typeLabel = {
            'image': '🖼 Изображение',
            'text': '📝 Текст',
            'schedule': '📅 Расписание'
        }[slide.type] || slide.type;
        
        let content = '';
        
        // КАРТИНКА с обработкой ошибок и placeholder
        if (slide.type === 'image' && slide.filename) {
            const imgUrl = slide.filename.startsWith('http') 
                ? slide.filename 
                : `${SERVER_URL}/slides/${slide.filename}`;
            
            content = `<img class="slide-preview" 
                src="${imgUrl}" 
                alt="Slide ${index + 1}"
                onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\'image-placeholder\'><div class=\'image-placeholder-icon\'>🖼</div><div class=\'image-placeholder-text\'>${slide.filename}</div></div>';">`;
        }
        else if (slide.type === 'schedule') {
            content = `<div class="slide-schedule">📅</div>`;
        }
        else {
            content = `<div class="slide-text">${escapeHtml(slide.text || 'Без текста')}</div>`;
        }
        
        // Подпись с обрезкой длинных имен
        let caption = '';
        if (slide.filename && slide.type === 'image') {
            const shortName = slide.filename.length > 25 ? slide.filename.substring(0, 22) + '...' : slide.filename;
            caption = `<div class="slide-caption" title="${slide.filename}">${shortName}</div>`;
        } else if (slide.text && slide.type !== 'text') {
            const shortText = slide.text.length > 30 ? slide.text.substring(0, 27) + '...' : slide.text;
            caption = `<div class="slide-caption">${shortText}</div>`;
        }
        
        const dur = slide.duration || 10;
        
        div.innerHTML = `
            <div class="slide-number">${index + 1}</div>
            <div class="slide-type-badge">${typeLabel}</div>
            <button class="delete-btn" onclick="event.stopPropagation(); deleteSlide(${index})" title="Удалить">×</button>
            <div style="position: relative;">${content}</div>
            ${caption}
            <div class="controls-panel">
                <div class="duration-row">
                    <span>Время показа:</span>
                    <span class="duration-current" id="dur-disp-${index}">${dur}с</span>
                </div>
                <div class="duration-buttons">
                    <button class="btn-dur" onclick="changeDur(${index}, -5)">−</button>
                    <input type="number" class="duration-input" id="dur-inp-${index}" 
                           value="${dur}" min="1" max="300"
                           onchange="setDur(${index}, this.value)">
                    <button class="btn-dur" onclick="changeDur(${index}, 5)">+</button>
                </div>
                <div class="quick-times">
                    <button class="quick-btn ${dur===5?'active':''}" onclick="setDur(${index}, 5)">5с</button>
                    <button class="quick-btn ${dur===10?'active':''}" onclick="setDur(${index}, 10)">10с</button>
                    <button class="quick-btn ${dur===15?'active':''}" onclick="setDur(${index}, 15)">15с</button>
                    <button class="quick-btn ${dur===30?'active':''}" onclick="setDur(${index}, 30)">30с</button>
                    <button class="quick-btn ${dur===60?'active':''}" onclick="setDur(${index}, 60)">1м</button>
                </div>
            </div>
        `;
        
        return div;
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function changeDur(idx, delta) {
        const inp = document.getElementById(`dur-inp-${idx}`);
        setDur(idx, parseInt(inp.value) + delta);
    }
    
    function setDur(idx, val) {
        let v = parseInt(val);
        if (isNaN(v) || v < 1) v = 1;
        if (v > 300) v = 300;
        
        slides[idx].duration = v;
        
        const inp = document.getElementById(`dur-inp-${idx}`);
        const disp = document.getElementById(`dur-disp-${idx}`);
        if (inp) inp.value = v;
        if (disp) disp.textContent = v + 'с';
        
        const panel = inp.closest('.controls-panel');
        if (panel) {
            const btns = panel.querySelectorAll('.quick-btn');
            btns.forEach(b => b.classList.remove('active'));
            if ([5,10,15,30,60].includes(v)) {
                const active = Array.from(btns).find(b => 
                    (v===60 && b.textContent==='1м') || b.textContent===v+'с'
                );
                if (active) active.classList.add('active');
            }
        }
        
        updateStats();
    }
    
    function updateOrder() {
        const items = document.querySelectorAll('.slide-item');
        const newSlides = [];
        
        items.forEach((item, newIdx) => {
            const oldIdx = parseInt(item.dataset.index);
            const inp = document.getElementById(`dur-inp-${oldIdx}`);
            const slide = {...slides[oldIdx]};
            slide.duration = parseInt(inp?.value) || 10;
            slide.order = newIdx;
            newSlides.push(slide);
        });
        
        slides = newSlides;
        render();
    }
    
    function deleteSlide(idx) {
        if (confirm('Удалить этот слайд?')) {
            slides.splice(idx, 1);
            updateStats();
            render();
        }
    }
    
    function saveAndClose() {
        const items = document.querySelectorAll('.slide-item');
        const finalSlides = [];
        
        items.forEach((item, idx) => {
            const oldIdx = parseInt(item.dataset.index);
            const inp = document.getElementById(`dur-inp-${oldIdx}`);
            const slide = slides[oldIdx];
            slide.duration = parseInt(inp?.value) || 10;
            slide.order = idx;
            finalSlides.push(slide);
        });
        
        const data = {
            action: 'carousel_update',
            slides: finalSlides.map(s => ({
                type: s.type,
                filename: s.filename,
                text: s.text || '',
                duration: s.duration,
                structure: s.structure,
                order: s.order
            }))
        };
        
        tg.sendData(JSON.stringify(data));
        
        tg.showPopup({
            title: '✅ Готово',
            message: `Сохранено ${finalSlides.length} слайдов`,
            buttons: [{type: 'ok'}]
        }, () => tg.close());
    }
    
    // Обработка изменения размера окна
    window.addEventListener('resize', () => {
        const container = document.getElementById('slidesContainer');
        if (slides.length > 0) {
            container.style.display = window.innerWidth >= 600 ? 'grid' : 'flex';
        }
    });
    
    loadSlides();
</script>

</body>
</html>
