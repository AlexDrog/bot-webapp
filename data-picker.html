<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Выбор даты</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: #16213e;
            padding: 25px 20px;
            text-align: center;
            border-bottom: 2px solid #e94560;
            flex-shrink: 0;
        }
        
        .header h2 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .header .subtitle {
            color: rgba(255,255,255,0.6);
            font-size: 14px;
        }

        /* Пресеты с цветными иконками */
        .quick-select {
            display: flex;
            gap: 10px;
            margin: 15px 20px;
            overflow-x: auto;
            padding-bottom: 5px;
            scrollbar-width: none;
        }
        
        .quick-select::-webkit-scrollbar { display: none; }
        
        .quick-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.9);
            padding: 12px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        
        /* Цвета для каждого пресета */
        .quick-btn[data-type="today"] {
            background: rgba(233, 69, 96, 0.2);
            border-color: #e94560;
            color: white;
        }
        
        .quick-btn[data-type="today"].active {
            background: #e94560;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
        }
        
        .quick-btn[data-type="tomorrow"] {
            background: rgba(255, 193, 7, 0.15);
            border-color: rgba(255, 193, 7, 0.5);
            color: #ffc107;
        }
        
        .quick-btn[data-type="tomorrow"].active {
            background: #ffc107;
            color: #000;
            box-shadow: 0 4px 15px rgba(255, 193, 7, 0.3);
        }
        
        .quick-btn[data-type="week"] {
            background: rgba(33, 150, 243, 0.15);
            border-color: rgba(33, 150, 243, 0.5);
            color: #2196f3;
        }
        
        .quick-btn[data-type="week"].active {
            background: #2196f3;
            color: white;
            box-shadow: 0 4px 15px rgba(33, 150, 243, 0.3);
        }
        
        .quick-btn[data-type="month"] {
            background: rgba(156, 39, 176, 0.15);
            border-color: rgba(156, 39, 176, 0.5);
            color: #9c27b0;
        }
        
        .quick-btn[data-type="month"].active {
            background: #9c27b0;
            color: white;
            box-shadow: 0 4px 15px rgba(156, 39, 176, 0.3);
        }

        .month-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 15px 20px;
            margin: 0 20px 15px;
        }
        
        .month-nav button {
            background: #0f3460;
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .month-nav button:active {
            background: #e94560;
            transform: scale(0.95);
        }
        
        .month-title {
            font-size: 18px;
            font-weight: 600;
        }

        /* Календарь темный */
        .calendar-wrapper {
            background: #16213e;
            border-radius: 20px;
            padding: 20px;
            margin: 0 20px 15px;
            border: 1px solid rgba(233, 69, 96, 0.2);
            flex: 1;
            overflow-y: auto;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 12px;
            text-align: center;
        }
        
        .weekday {
            font-size: 12px;
            color: #888;
            font-weight: 600;
            text-transform: uppercase;
            padding: 8px 0;
        }
        
        .weekday.weekend {
            color: #e94560;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }
        
        .day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
            font-size: 16px;
        }
        
        .day:active {
            transform: scale(0.95);
        }
        
        .day.today {
            background: rgba(233, 69, 96, 0.2);
            border-color: #e94560;
            color: #e94560;
            font-weight: 700;
        }
        
        .day.selected {
            background: #e94560;
            color: white;
            box-shadow: 0 4px 20px rgba(233, 69, 96, 0.5);
            transform: scale(1.05);
        }
        
        .day.other-month {
            opacity: 0.2;
        }
        
        .day.disabled {
            opacity: 0.1;
            cursor: not-allowed;
        }

        /* Превью */
        .selected-preview {
            background: rgba(233, 69, 96, 0.15);
            border: 2px solid rgba(233, 69, 96, 0.4);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            margin: 0 20px 15px;
        }
        
        .preview-label {
            font-size: 12px;
            color: #e94560;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        
        .preview-date {
            font-size: 28px;
            font-weight: 300;
        }

        /* Кнопки */
        .actions {
            display: flex;
            gap: 12px;
            padding: 20px;
            margin-top: auto;
            padding-bottom: max(20px, env(safe-area-inset-bottom, 20px));
        }
        
        .btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        
        .btn-primary {
            background: #e94560;
            color: white;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
        }

        @media (max-width: 380px) {
            .quick-btn { padding: 10px 16px; font-size: 13px; }
            .day { font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>📅 Выбор даты</h2>
        <div class="subtitle">Выберите день для сокращенного режима</div>
    </div>

    <!-- Пресеты: Сегодня, Завтра, Неделя, Месяц с цветами -->
    <div class="quick-select">
        <div class="quick-btn active" data-type="today" onclick="selectQuick(0, 'today')">
            <span>📍</span> Сегодня
        </div>
        <div class="quick-btn" data-type="tomorrow" onclick="selectQuick(1, 'tomorrow')">
            <span>☀️</span> Завтра
        </div>
        <div class="quick-btn" data-type="week" onclick="selectQuick(7, 'week')">
            <span>📅</span> Неделя
        </div>
        <div class="quick-btn" data-type="month" onclick="selectQuick(30, 'month')">
            <span>📆</span> Месяц
        </div>
    </div>

    <div class="month-nav">
        <button onclick="changeMonth(-1)">‹</button>
        <div class="month-title" id="monthTitle">Апрель 2026</div>
        <button onclick="changeMonth(1)">›</button>
    </div>

    <div class="calendar-wrapper">
        <div class="weekdays">
            <div class="weekday">Пн</div>
            <div class="weekday">Вт</div>
            <div class="weekday">Ср</div>
            <div class="weekday">Чт</div>
            <div class="weekday">Пт</div>
            <div class="weekday weekend">Сб</div>
            <div class="weekday weekend">Вс</div>
        </div>
        <div class="days-grid" id="calendarGrid"></div>
    </div>

    <div class="selected-preview">
        <div class="preview-label">Выбрана дата</div>
        <div class="preview-date" id="previewDate">10 апреля 2026</div>
    </div>

    <div class="actions">
        <button class="btn btn-secondary" onclick="tg.close()">Отмена</button>
        <button class="btn btn-primary" onclick="confirmDate()">Подтвердить</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        const months = ['Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь', 
                       'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'];
        const monthsShort = ['янв', 'фев', 'мар', 'апр', 'май', 'июн', 
                            'июл', 'авг', 'сен', 'окт', 'ноя', 'дек'];
        
        let selectedDate = new Date();
        let displayDate = new Date();
        
        function init() {
            renderCalendar();
            updatePreview();
        }
        
        function renderCalendar() {
            const year = displayDate.getFullYear();
            const month = displayDate.getMonth();
            
            document.getElementById('monthTitle').textContent = `${months[month]} ${year}`;
            
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            let startingDay = firstDay.getDay() || 7;
            startingDay = startingDay === 0 ? 7 : startingDay;
            
            const prevMonthDays = new Date(year, month, 0).getDate();
            
            // Дни предыдущего месяца
            for (let i = startingDay - 2; i >= 0; i--) {
                const dayDiv = document.createElement('div');
                dayDiv.className = 'day other-month';
                dayDiv.textContent = prevMonthDays - i;
                grid.appendChild(dayDiv);
            }
            
            // Дни текущего месяца
            const today = new Date();
            for (let day = 1; day <= lastDay.getDate(); day++) {
                const date = new Date(year, month, day);
                const isToday = date.toDateString() === today.toDateString();
                const isSelected = date.toDateString() === selectedDate.toDateString();
                const isPast = date < new Date(today.setHours(0,0,0,0));
                
                const dayDiv = document.createElement('div');
                dayDiv.className = 'day';
                if (isToday) dayDiv.classList.add('today');
                if (isSelected) dayDiv.classList.add('selected');
                if (isPast) dayDiv.classList.add('disabled');
                
                dayDiv.textContent = day;
                
                if (!isPast) {
                    dayDiv.onclick = () => selectDate(date);
                }
                
                grid.appendChild(dayDiv);
            }
            
            // Дни следующего месяца
            const totalCells = grid.children.length;
            const remaining = 42 - totalCells;
            for (let i = 1; i <= remaining; i++) {
                const dayDiv = document.createElement('div');
                dayDiv.className = 'day other-month';
                dayDiv.textContent = i;
                grid.appendChild(dayDiv);
            }
        }
        
        function selectDate(date) {
            selectedDate = new Date(date);
            displayDate = new Date(date.getFullYear(), date.getMonth(), 1);
            
            // Сброс активных пресетов
            document.querySelectorAll('.quick-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            renderCalendar();
            updatePreview();
            tg.HapticFeedback?.impactOccurred?.('medium');
        }
        
        function selectQuick(daysAdd, type) {
            const date = new Date();
            date.setDate(date.getDate() + daysAdd);
            selectedDate = date;
            displayDate = new Date(date.getFullYear(), date.getMonth(), 1);
            
            // Активируем нужный пресет
            document.querySelectorAll('.quick-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.type === type);
            });
            
            renderCalendar();
            updatePreview();
            tg.HapticFeedback?.impactOccurred?.('light');
        }
        
        function changeMonth(delta) {
            displayDate.setMonth(displayDate.getMonth() + delta);
            renderCalendar();
            tg.HapticFeedback?.impactOccurred?.('light');
        }
        
        function updatePreview() {
            const day = selectedDate.getDate();
            const month = months[selectedDate.getMonth()].toLowerCase();
            const year = selectedDate.getFullYear();
            
            document.getElementById('previewDate').textContent = `${day} ${month} ${year}`;
        }
        
        function confirmDate() {
            const result = {
                action: 'set_date',
                date: selectedDate.toISOString().split('T')[0],
                formatted: `${selectedDate.getDate()} ${months[selectedDate.getMonth()]} ${selectedDate.getFullYear()}`
            };
            
            tg.HapticFeedback?.impactOccurred?.('heavy');
            tg.sendData(JSON.stringify(result));
            tg.close();
        }
        
        init();
    </script>
</body>
</html>
