<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Выбор даты</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        
        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: white;
            overflow-x: hidden;
        }
        
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* На ПК центрируем и ограничиваем ширину */
        @media (min-width: 768px) {
            body {
                max-width: 600px;
                margin: 0 auto;
                border-left: 1px solid rgba(233, 69, 96, 0.3);
                border-right: 1px solid rgba(233, 69, 96, 0.3);
            }
        }

        .header {
            background: #16213e;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #e94560;
            flex-shrink: 0;
        }
        
        .header h2 { font-size: 22px; margin-bottom: 5px; }
        .header .subtitle { color: rgba(255,255,255,0.6); font-size: 13px; }

        /* Пресеты - адаптивные */
        .quick-select {
            display: flex;
            gap: 8px;
            margin: 12px 15px;
            overflow-x: auto;
            padding: 5px;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            flex-shrink: 0;
        }
        
        .quick-select::-webkit-scrollbar { display: none; }
        
        .quick-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.9);
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }
        
        /* Цвета пресетов */
        .quick-btn[data-type="today"] {
            background: rgba(233, 69, 96, 0.2);
            border-color: #e94560;
            color: white;
        }
        .quick-btn[data-type="today"].active {
            background: #e94560;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
        }
        
        .quick-btn[data-type="tomorrow"] {
            background: rgba(255, 193, 7, 0.15);
            border-color: rgba(255, 193, 7, 0.5);
            color: #ffc107;
        }
        .quick-btn[data-type="tomorrow"].active {
            background: #ffc107;
            color: #000;
        }
        
        .quick-btn[data-type="week"] {
            background: rgba(33, 150, 243, 0.15);
            border-color: rgba(33, 150, 243, 0.5);
            color: #2196f3;
        }
        .quick-btn[data-type="week"].active {
            background: #2196f3;
            color: white;
        }
        
        .quick-btn[data-type="month"] {
            background: rgba(156, 39, 176, 0.15);
            border-color: rgba(156, 39, 176, 0.5);
            color: #9c27b0;
        }
        .quick-btn[data-type="month"].active {
            background: #9c27b0;
            color: white;
        }

        /* На очень маленьких экранах — сетка 2x2 */
        @media (max-width: 360px) {
            .quick-select {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 8px;
                overflow-x: visible;
            }
            .quick-btn {
                justify-content: center;
                padding: 10px 8px;
                font-size: 12px;
            }
        }

        .month-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 12px 15px;
            margin: 0 15px 12px;
            flex-shrink: 0;
        }
        
        .month-nav button {
            background: #0f3460;
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
        }
        
        .month-title { font-size: 16px; font-weight: 600; }

        .calendar-wrapper {
            background: #16213e;
            border-radius: 16px;
            padding: 15px;
            margin: 0 15px 12px;
            border: 1px solid rgba(233, 69, 96, 0.2);
            flex: 1;
            overflow-y: auto;
            min-height: 0;
            max-height: 50vh; /* Ограничение для ПК чтобы не растягивался бесконечно */
        }
        
        /* На мобильных убираем ограничение высоты */
        @media (max-height: 800px) {
            .calendar-wrapper {
                max-height: none;
            }
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .weekday {
            font-size: 11px;
            color: #888;
            font-weight: 600;
            text-transform: uppercase;
            padding: 6px 0;
        }
        
        .weekday.weekend { color: #e94560; }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
        }
        
        .day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
            font-size: 15px;
            min-height: 40px; /* Минимальная высота для читаемости */
            max-height: 60px; /* Ограничение для ПК */
        }
        
        /* На ПК уменьшаем максимальную высоту ячеек */
        @media (min-width: 768px) {
            .day {
                max-height: 50px;
            }
        }
        
        .day.today {
            background: rgba(233, 69, 96, 0.2);
            border-color: #e94560;
            color: #e94560;
            font-weight: 700;
        }
        
        .day.selected {
            background: #e94560;
            color: white;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.5);
            transform: scale(1.05);
        }
        
        .day.other-month { opacity: 0.2; }
        .day.disabled { opacity: 0.1; cursor: not-allowed; }

        .selected-preview {
            background: rgba(233, 69, 96, 0.15);
            border: 2px solid rgba(233, 69, 96, 0.4);
            border-radius: 14px;
            padding: 15px;
            text-align: center;
            margin: 0 15px 12px;
            flex-shrink: 0;
        }
        
        .preview-label {
            font-size: 11px;
            color: #e94560;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        
        .preview-date { font-size: 24px; font-weight: 300; }

        .actions {
            display: flex;
            gap: 10px;
            padding: 15px;
            padding-bottom: max(15px, env(safe-area-inset-bottom, 15px));
            flex-shrink: 0;
            background: #1a1a2e; /* Фон чтобы перекрывать контент при скролле */
        }
        
        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .btn-secondary { background: rgba(255,255,255,0.1); color: white; }
        .btn-primary { background: #e94560; color: white; }

        @media (max-width: 380px) {
            .day { font-size: 14px; min-height: 35px; }
            .header h2 { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>📅 Выбор даты</h2>
    </div>

    <!-- Пресеты: горизонтальная прокрутка или сетка 2x2 на маленьких -->
    <div class="quick-select">
        <div class="quick-btn active" data-type="today" onclick="selectQuick(0, 'today')">
            <span>📍</span> Сегодня
        </div>
        <div class="quick-btn" data-type="tomorrow" onclick="selectQuick(1, 'tomorrow')">
            <span>☀️</span> Завтра
        </div>
        <div class="quick-btn" data-type="week" onclick="selectQuick(7, 'week')">
            <span>📅</span> Неделя
        </div>
        <div class="quick-btn" data-type="month" onclick="selectQuick(30, 'month')">
            <span>📆</span> Месяц
        </div>
    </div>

    <div class="month-nav">
        <button onclick="changeMonth(-1)">‹</button>
        <div class="month-title" id="monthTitle">Апрель 2026</div>
        <button onclick="changeMonth(1)">›</button>
    </div>

    <div class="calendar-wrapper">
        <div class="weekdays">
            <div class="weekday">Пн</div>
            <div class="weekday">Вт</div>
            <div class="weekday">Ср</div>
            <div class="weekday">Чт</div>
            <div class="weekday">Пт</div>
            <div class="weekday weekend">Сб</div>
            <div class="weekday weekend">Вс</div>
        </div>
        <div class="days-grid" id="calendarGrid"></div>
    </div>

    <div class="selected-preview">
        <div class="preview-label">Выбрана дата</div>
        <div class="preview-date" id="previewDate">10 апреля 2026</div>
    </div>

    <div class="actions">
        <button class="btn btn-secondary" onclick="tg.close()">Отмена</button>
        <button class="btn btn-primary" onclick="confirmDate()">Подтвердить</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        const months = ['Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь', 
                       'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'];
        
        let selectedDate = new Date();
        let displayDate = new Date();
        
        function init() {
            renderCalendar();
            updatePreview();
        }
        
        function renderCalendar() {
            const year = displayDate.getFullYear();
            const month = displayDate.getMonth();
            document.getElementById('monthTitle').textContent = `${months[month]} ${year}`;
            
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            let startingDay = firstDay.getDay() || 7;
            startingDay = startingDay === 0 ? 7 : startingDay;
            
            const prevMonthDays = new Date(year, month, 0).getDate();
            
            for (let i = startingDay - 2; i >= 0; i--) {
                const div = document.createElement('div');
                div.className = 'day other-month';
                div.textContent = prevMonthDays - i;
                grid.appendChild(div);
            }
            
            const today = new Date();
            for (let day = 1; day <= lastDay.getDate(); day++) {
                const date = new Date(year, month, day);
                const isToday = date.toDateString() === today.toDateString();
                const isSelected = date.toDateString() === selectedDate.toDateString();
                const isPast = date < new Date(today.setHours(0,0,0,0));
                
                const div = document.createElement('div');
                div.className = 'day';
                if (isToday) div.classList.add('today');
                if (isSelected) div.classList.add('selected');
                if (isPast) div.classList.add('disabled');
                div.textContent = day;
                
                if (!isPast) div.onclick = () => selectDate(date);
                grid.appendChild(div);
            }
            
            const total = grid.children.length;
            for (let i = 1; i <= 42 - total; i++) {
                const div = document.createElement('div');
                div.className = 'day other-month';
                div.textContent = i;
                grid.appendChild(div);
            }
        }
        
        function selectDate(date) {
            selectedDate = new Date(date);
            displayDate = new Date(date.getFullYear(), date.getMonth(), 1);
            document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('active'));
            renderCalendar();
            updatePreview();
            tg.HapticFeedback?.impactOccurred?.('medium');
        }
        
        function selectQuick(daysAdd, type) {
            const date = new Date();
            date.setDate(date.getDate() + daysAdd);
            selectedDate = date;
            displayDate = new Date(date.getFullYear(), date.getMonth(), 1);
            document.querySelectorAll('.quick-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.type === type);
            });
            renderCalendar();
            updatePreview();
            tg.HapticFeedback?.impactOccurred?.('light');
        }
        
        function changeMonth(delta) {
            displayDate.setMonth(displayDate.getMonth() + delta);
            renderCalendar();
            tg.HapticFeedback?.impactOccurred?.('light');
        }
        
        function updatePreview() {
            const d = selectedDate.getDate();
            const m = months[selectedDate.getMonth()].toLowerCase();
            const y = selectedDate.getFullYear();
            document.getElementById('previewDate').textContent = `${d} ${m} ${y}`;
        }
        
        function confirmDate() {
            tg.sendData(JSON.stringify({
                action: 'set_date',
                date: selectedDate.toISOString().split('T')[0],
                formatted: `${selectedDate.getDate()} ${months[selectedDate.getMonth()]} ${selectedDate.getFullYear()}`
            }));
            tg.HapticFeedback?.impactOccurred?.('heavy');
            tg.close();
        }
        
        init();
    </script>
</body>
</html>
