<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Выбор времени</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: white;
            overflow: hidden;
        }

        /* Шапка */
        .header {
            background: #16213e;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #e94560;
            flex-shrink: 0;
        }
        
        .time-display {
            font-size: 48px;
            font-weight: 300;
            letter-spacing: 4px;
        }
        
        .time-unit {
            padding: 8px 12px;
            cursor: pointer;
            opacity: 0.5;
        }
        
        .time-unit.active {
            opacity: 1;
            color: #e94560;
            font-weight: 500;
        }

        /* Циферблат */
        .clock-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }
        
        .clock-container {
            width: min(85vw, 300px);
            height: min(85vw, 300px);
            position: relative;
        }
        
        .clock-face {
            width: 100%;
            height: 100%;
            background: #16213e;
            border-radius: 50%;
            position: relative;
            border: 2px solid #0f3460;
        }

        /* Центр */
        .center-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 8px;
            height: 8px;
            background: #e94560;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        /* Стрелка - простая и четкая */
        .hand-line {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 3px;
            background: #e94560;
            transform-origin: bottom center;
            z-index: 5;
            margin-left: -1.5px;
            border-radius: 2px;
        }

        /* Круг выделения */
        .selection-circle {
            position: absolute;
            width: 44px;
            height: 44px;
            background: #e94560;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 3;
            border: 2px solid #1a1a2e;
            transition: all 0.2s;
        }

        /* Цифры */
        .number {
            position: absolute;
            width: 36px;
            height: 36px;
            line-height: 36px;
            text-align: center;
            font-size: 16px;
            color: rgba(255,255,255,0.8);
            border-radius: 50%;
            cursor: pointer;
            z-index: 4;
            transform: translate(-50%, -50%);
        }
        
        .number.selected {
            color: white;
            font-weight: 600;
        }
        
        .number.inner {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
        }

        /* Кнопки */
        .actions {
            background: #16213e;
            padding: 20px;
            display: flex;
            justify-content: flex-end;
            gap: 20px;
            flex-shrink: 0;
            border-top: 1px solid #0f3460;
        }
        
        .btn {
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.6);
            font-size: 16px;
            padding: 12px 24px;
            cursor: pointer;
            border-radius: 8px;
        }
        
        .btn.primary {
            background: #e94560;
            color: white;
        }

        /* Адаптация */
        @media (max-height: 600px) {
            .clock-container { width: min(80vw, 260px); height: min(80vw, 260px); }
            .number { width: 32px; height: 32px; line-height: 32px; font-size: 14px; }
            .time-display { font-size: 40px; }
            .header { padding: 15px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="time-display">
            <span class="time-unit active" id="hourDisplay" onclick="setMode('hour')">10</span>
            <span style="opacity:0.3">:</span>
            <span class="time-unit" id="minuteDisplay" onclick="setMode('minute')">00</span>
        </div>
    </div>

    <div class="clock-section">
        <div class="clock-container">
            <div class="clock-face" id="clockFace">
                <div class="center-dot"></div>
                <div class="selection-circle" id="selectionCircle"></div>
                <div class="hand-line" id="handLine"></div>
            </div>
        </div>
    </div>

    <div class="actions">
        <button class="btn" onclick="tg.close()">Отмена</button>
        <button class="btn primary" onclick="confirm()">OK</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        let mode = 'hour';
        let hour = 10;
        let minute = 0;
        let isDragging = false;
        const clockFace = document.getElementById('clockFace');
        let center = 150;
        
        function init() {
            setTimeout(() => {
                const rect = clockFace.getBoundingClientRect();
                center = rect.width / 2;
                renderNumbers();
                updateClock();
            }, 50);
        }
        
        function renderNumbers() {
            clockFace.querySelectorAll('.number').forEach(n => n.remove());
            
            const outerR = center * 0.75; // Внешний круг 1-12
            const innerR = center * 0.45;   // Внутренний круг 13-00
            
            if (mode === 'hour') {
                // 1-12 снаружи
                for (let i = 1; i <= 12; i++) {
                    const angle = (i * 30 - 90) * Math.PI / 180;
                    const x = center + outerR * Math.cos(angle);
                    const y = center + outerR * Math.sin(angle);
                    const el = createNumber(i, x, y, i);
                    clockFace.appendChild(el);
                }
                // 13-23 и 00 внутри
                for (let i = 0; i < 12; i++) {
                    const val = i === 0 ? 0 : i + 12;
                    const angle = (i * 30 - 90) * Math.PI / 180;
                    const x = center + innerR * Math.cos(angle);
                    const y = center + innerR * Math.sin(angle);
                    const el = createNumber(val === 0 ? '00' : val, x, y, val, true);
                    clockFace.appendChild(el);
                }
            } else {
                // Минуты 00-55
                const r = center * 0.75;
                for (let i = 0; i < 12; i++) {
                    const val = i * 5;
                    const angle = (i * 30 - 90) * Math.PI / 180;
                    const x = center + r * Math.cos(angle);
                    const y = center + r * Math.sin(angle);
                    const el = createNumber(String(val).padStart(2,'0'), x, y, val);
                    clockFace.appendChild(el);
                }
            }
        }
        
        function createNumber(text, x, y, value, isInner = false) {
            const div = document.createElement('div');
            div.className = 'number' + (isInner ? ' inner' : '');
            div.style.left = x + 'px';
            div.style.top = y + 'px';
            div.textContent = text;
            div.dataset.value = value;
            
            div.addEventListener('pointerdown', (e) => {
                e.stopPropagation();
                if (mode === 'hour') {
                    hour = value;
                    document.getElementById('hourDisplay').textContent = String(hour).padStart(2,'0');
                    updateClock();
                    tg.HapticFeedback?.impactOccurred?.('medium');
                    setTimeout(() => setMode('minute'), 300);
                } else {
                    minute = value;
                    document.getElementById('minuteDisplay').textContent = String(minute).padStart(2,'0');
                    updateClock();
                    tg.HapticFeedback?.impactOccurred?.('medium');
                }
            });
            
            return div;
        }
        
        function updateClock() {
            const r = mode === 'hour' ? 
                ((hour === 0 || hour > 12) ? center * 0.45 : center * 0.75) : 
                center * 0.75;
            
            let angle;
            if (mode === 'hour') {
                if (hour === 0) angle = -90;
                else if (hour <= 12) angle = (hour * 30) - 90;
                else angle = ((hour - 12) * 30) - 90;
            } else {
                angle = (minute * 6) - 90;
            }
            
            // Круг выделения
            const rad = angle * Math.PI / 180;
            const x = center + r * Math.cos(rad);
            const y = center + r * Math.sin(rad);
            
            document.getElementById('selectionCircle').style.left = x + 'px';
            document.getElementById('selectionCircle').style.top = y + 'px';
            
            // Стрелка от центра к выделению
            const line = document.getElementById('handLine');
            line.style.height = r + 'px';
            line.style.marginTop = -r + 'px'; // Сдвигаем вверх от центра
            line.style.transform = `rotate(${angle + 90}deg)`;
            
            // Подсветка цифры
            const currentVal = mode === 'hour' ? hour : minute;
            document.querySelectorAll('.number').forEach(n => {
                n.classList.toggle('selected', parseInt(n.dataset.value) === currentVal);
            });
        }
        
        function setMode(m) {
            if (mode === m) return;
            mode = m;
            document.getElementById('hourDisplay').classList.toggle('active', m === 'hour');
            document.getElementById('minuteDisplay').classList.toggle('active', m === 'minute');
            renderNumbers();
            updateClock();
        }
        
        // Drag
        clockFace.addEventListener('pointerdown', (e) => {
            isDragging = true;
            clockFace.setPointerCapture(e.pointerId);
            handleDrag(e);
        });
        
        function handleDrag(e) {
            if (!isDragging) return;
            e.preventDefault();
            
            const rect = clockFace.getBoundingClientRect();
            const cx = rect.left + rect.width/2;
            const cy = rect.top + rect.height/2;
            
            const x = e.clientX - cx;
            const y = e.clientY - cy;
            const dist = Math.sqrt(x*x + y*y);
            
            let angle = Math.atan2(y, x) * 180 / Math.PI + 90;
            if (angle < 0) angle += 360;
            
            if (mode === 'hour') {
                const pos = Math.round(angle / 30) % 12;
                const isInner = dist < center * 0.6;
                let newHour = isInner ? (pos === 0 ? 0 : pos + 12) : (pos === 0 ? 12 : pos);
                
                if (newHour !== hour) {
                    hour = newHour;
                    document.getElementById('hourDisplay').textContent = String(hour).padStart(2,'0');
                    updateClock();
                    tg.HapticFeedback?.selectionChanged?.();
                }
            } else {
                const newMin = Math.round(angle / 6) % 60;
                if (newMin !== minute) {
                    minute = newMin;
                    document.getElementById('minuteDisplay').textContent = String(minute).padStart(2,'0');
                    updateClock();
                    tg.HapticFeedback?.selectionChanged?.();
                }
            }
        }
        
        clockFace.addEventListener('pointermove', handleDrag);
        clockFace.addEventListener('pointerup', () => {
            if (isDragging && mode === 'hour') setTimeout(() => setMode('minute'), 200);
            isDragging = false;
        });
        
        function confirm() {
            const time = `${String(hour).padStart(2,'0')}:${String(minute).padStart(2,'0')}`;
            tg.sendData(JSON.stringify({action:'set_time', time, hour, minute}));
            tg.close();
        }
        
        window.addEventListener('resize', () => {
            const rect = clockFace.getBoundingClientRect();
            center = rect.width / 2;
            renderNumbers();
            updateClock();
        });
        
        init();
    </script>
</body>
</html>
