<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Выбор времени</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            /* Тёмная тема (по умолчанию) */
            --bg-gradient-start: #1a1a2e;
            --bg-gradient-mid: #16213e;
            --bg-gradient-end: #0f0f1e;
            --header-bg: rgba(22, 33, 62, 0.8);
            --header-border: rgba(233, 69, 96, 0.3);
            --badge-bg: rgba(233, 69, 96, 0.2);
            --badge-border: rgba(233, 69, 96, 0.4);
            --badge-color: #e94560;
            --text-primary: white;
            --text-secondary: rgba(255,255,255,0.7);
            --text-muted: rgba(255,255,255,0.5);
            --separator-opacity: 0.3;
            --active-bg: rgba(233, 69, 96, 0.15);
            --active-color: #e94560;
            --active-shadow: 0 0 20px rgba(233, 69, 96, 0.3), inset 0 0 10px rgba(233, 69, 96, 0.1);
            --clock-face-start: #1e3a5f;
            --clock-face-mid: #16213e;
            --clock-face-end: #0f0f1e;
            --clock-shadow: 0 0 60px rgba(233, 69, 96, 0.1), inset 0 0 40px rgba(0,0,0,0.3), 0 0 0 1px rgba(233, 69, 96, 0.2);
            --conic-gradient: transparent, rgba(233, 69, 96, 0.1), transparent 30%;
            --center-dot: #e94560;
            --center-glow: rgba(233, 69, 96, 0.8);
            --hand-start: #e94560;
            --hand-end: #ff6b7a;
            --hand-glow: rgba(233, 69, 96, 0.6);
            --selection-start: #ff6b7a;
            --selection-end: #e94560;
            --selection-shadow: 0 5px 20px rgba(233, 69, 96, 0.5), 0 0 0 4px rgba(233, 69, 96, 0.2), inset 0 -2px 5px rgba(0,0,0,0.2);
            --selection-border: #1a1a2e;
            --number-color: rgba(255,255,255,0.7);
            --number-inner: rgba(255,255,255,0.5);
            --number-selected: white;
            --ripple-bg: rgba(233, 69, 96, 0.4);
            --actions-bg: rgba(22, 33, 62, 0.9);
            --actions-border: rgba(233, 69, 96, 0.2);
            --summary-muted: rgba(255,255,255,0.5);
            --summary-active: #e94560;
            --btn-color: rgba(255,255,255,0.6);
            --btn-active-bg: rgba(255,255,255,0.1);
            --btn-active-color: white;
            --primary-start: #e94560;
            --primary-end: #c73e54;
            --primary-shadow: 0 4px 20px rgba(233, 69, 96, 0.4);
            --primary-active-shadow: 0 6px 25px rgba(233, 69, 96, 0.6);
            --preset-bg: rgba(255,255,255,0.05);
            --preset-border: rgba(233, 69, 96, 0.2);
            --preset-color: rgba(255,255,255,0.7);
            --preset-active-bg: rgba(233, 69, 96, 0.2);
            --preset-active-border: #e94560;
            --preset-active-color: white;
            --preset-active-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
            --error-bg: rgba(233, 69, 96, 0.9);
            --theme-toggle-bg: rgba(255,255,255,0.1);
            --theme-toggle-color: rgba(255,255,255,0.7);
            --theme-toggle-border: rgba(255,255,255,0.1);
        }

        [data-theme="light"] {
            /* Светлая тема */
            --bg-gradient-start: #f0f2f5;
            --bg-gradient-mid: #e8ecf1;
            --bg-gradient-end: #dce3eb;
            --header-bg: rgba(255, 255, 255, 0.85);
            --header-border: rgba(233, 69, 96, 0.2);
            --badge-bg: rgba(233, 69, 96, 0.1);
            --badge-border: rgba(233, 69, 96, 0.3);
            --badge-color: #c73e54;
            --text-primary: #1a1a2e;
            --text-secondary: rgba(26, 26, 46, 0.7);
            --text-muted: rgba(26, 26, 46, 0.5);
            --separator-opacity: 0.2;
            --active-bg: rgba(233, 69, 96, 0.1);
            --active-color: #c73e54;
            --active-shadow: 0 0 15px rgba(233, 69, 96, 0.15), inset 0 0 8px rgba(233, 69, 96, 0.05);
            --clock-face-start: #ffffff;
            --clock-face-mid: #f5f7fa;
            --clock-face-end: #e8ecf1;
            --clock-shadow: 0 10px 40px rgba(0,0,0,0.1), inset 0 0 30px rgba(0,0,0,0.03), 0 0 0 1px rgba(233, 69, 96, 0.15);
            --conic-gradient: transparent, rgba(233, 69, 96, 0.06), transparent 30%;
            --center-dot: #c73e54;
            --center-glow: rgba(199, 62, 84, 0.5);
            --hand-start: #c73e54;
            --hand-end: #e94560;
            --hand-glow: rgba(233, 69, 96, 0.3);
            --selection-start: #e94560;
            --selection-end: #c73e54;
            --selection-shadow: 0 5px 20px rgba(233, 69, 96, 0.3), 0 0 0 4px rgba(233, 69, 96, 0.15), inset 0 -2px 5px rgba(0,0,0,0.1);
            --selection-border: #f0f2f5;
            --number-color: rgba(26, 26, 46, 0.6);
            --number-inner: rgba(26, 26, 46, 0.4);
            --number-selected: #1a1a2e;
            --ripple-bg: rgba(233, 69, 96, 0.25);
            --actions-bg: rgba(255, 255, 255, 0.9);
            --actions-border: rgba(233, 69, 96, 0.15);
            --summary-muted: rgba(26, 26, 46, 0.5);
            --summary-active: #c73e54;
            --btn-color: rgba(26, 26, 46, 0.6);
            --btn-active-bg: rgba(26, 26, 46, 0.08);
            --btn-active-color: #1a1a2e;
            --primary-start: #e94560;
            --primary-end: #c73e54;
            --primary-shadow: 0 4px 20px rgba(233, 69, 96, 0.3);
            --primary-active-shadow: 0 6px 25px rgba(233, 69, 96, 0.4);
            --preset-bg: rgba(255,255,255,0.6);
            --preset-border: rgba(233, 69, 96, 0.15);
            --preset-color: rgba(26, 26, 46, 0.6);
            --preset-active-bg: rgba(233, 69, 96, 0.1);
            --preset-active-border: #c73e54;
            --preset-active-color: #1a1a2e;
            --preset-active-shadow: 0 4px 15px rgba(233, 69, 96, 0.2);
            --error-bg: rgba(233, 69, 96, 0.9);
            --theme-toggle-bg: rgba(26, 26, 46, 0.08);
            --theme-toggle-color: rgba(26, 26, 46, 0.6);
            --theme-toggle-border: rgba(26, 26, 46, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: none;
        }

        body {
            font-family: 'Roboto', 'Noto Sans', -apple-system, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-mid) 50%, var(--bg-gradient-end) 100%);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: var(--text-primary);
            transition: background 0.5s ease;
        }

        .header {
            background: var(--header-bg);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--header-border);
            padding: 25px 20px 20px;
            text-align: center;
            flex-shrink: 0;
            box-shadow: 0 4px 30px rgba(0,0,0,0.1);
            position: relative;
            transition: all 0.5s ease;
        }

        .theme-toggle {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--theme-toggle-bg);
            border: 1px solid var(--theme-toggle-border);
            color: var(--theme-toggle-color);
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 10;
        }

        .theme-toggle:active {
            transform: scale(0.9);
        }

        .mode-badge {
            display: inline-block;
            background: var(--badge-bg);
            border: 1px solid var(--badge-border);
            color: var(--badge-color);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-weight: 600;
            transition: all 0.5s ease;
        }

        .time-context {
            font-size: 13px;
            color: var(--badge-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
            opacity: 0;
            transform: translateY(-10px);
            animation: fadeInDown 0.5s ease forwards;
            transition: color 0.5s ease;
        }

        @keyframes fadeInDown {
            to { opacity: 1; transform: translateY(0); }
        }

        .time-display {
            font-size: clamp(40px, 12vw, 56px);
            font-weight: 200;
            color: var(--text-primary);
            letter-spacing: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.05);
            transition: color 0.5s ease;
        }

        .time-unit {
            padding: 10px 16px;
            border-radius: 12px;
            cursor: pointer;
            opacity: 0.4;
            transition: all 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
            font-variant-numeric: tabular-nums;
            color: var(--text-primary);
        }

        .time-unit.active {
            opacity: 1;
            color: var(--active-color);
            font-weight: 500;
            background: var(--active-bg);
            box-shadow: var(--active-shadow);
            transform: scale(1.05);
        }

        .separator {
            opacity: var(--separator-opacity);
            font-weight: 100;
            color: var(--text-primary);
        }

        .presets {
            display: flex;
            gap: 10px;
            padding: 15px 20px;
            overflow-x: auto;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            flex-shrink: 0;
        }

        .presets::-webkit-scrollbar { display: none; }

        .preset-chip {
            background: var(--preset-bg);
            border: 1px solid var(--preset-border);
            color: var(--preset-color);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            flex-shrink: 0;
        }

        .preset-chip:active {
            background: var(--preset-active-bg);
            border-color: var(--preset-active-border);
            color: var(--preset-active-color);
            transform: translateY(-2px);
            box-shadow: var(--preset-active-shadow);
        }

        .clock-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            min-height: 0;
        }

        .clock-container {
            width: min(85vw, 300px);
            height: min(85vw, 300px);
            position: relative;
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.15));
        }

        .clock-face {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 30%, var(--clock-face-start) 0%, var(--clock-face-mid) 50%, var(--clock-face-end) 100%);
            border-radius: 50%;
            position: relative;
            box-shadow: var(--clock-shadow);
            overflow: hidden;
            transition: all 0.5s ease;
        }

        .clock-face::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, var(--conic-gradient));
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }

        .center-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 10px;
            height: 10px;
            background: var(--center-dot);
            border-radius: 50%;
            z-index: 20;
            box-shadow: 0 0 20px var(--center-glow);
            animation: pulse 2s ease-in-out infinite;
            transition: all 0.5s ease;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.8; }
        }

        .hand-line {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 3px;
            background: linear-gradient(to top, var(--hand-start) 0%, var(--hand-end) 100%);
            transform-origin: bottom center;
            z-index: 5;
            margin-left: -1.5px;
            border-radius: 3px;
            box-shadow: 0 0 10px var(--hand-glow);
            transition: all 0.3s cubic-bezier(0.4, 0.0, 0.2, 1), background 0.5s ease;
        }

        .selection-circle {
            position: absolute;
            width: 46px;
            height: 46px;
            background: radial-gradient(circle at 30% 30%, var(--selection-start) 0%, var(--selection-end) 100%);
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            z-index: 3;
            box-shadow: var(--selection-shadow);
            animation: popIn 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
            border: 2px solid var(--selection-border);
            transition: all 0.5s ease;
        }

        @keyframes popIn {
            to { transform: translate(-50%, -50%) scale(1); }
        }

        .number {
            position: absolute;
            width: 38px;
            height: 38px;
            line-height: 38px;
            text-align: center;
            font-size: 16px;
            font-weight: 400;
            color: var(--number-color);
            border-radius: 50%;
            cursor: pointer;
            z-index: 4;
            transform: translate(-50%, -50%) scale(0);
            animation: numberAppear 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            transition: all 0.2s, color 0.5s ease;
        }

        @keyframes numberAppear {
            to { transform: translate(-50%, -50%) scale(1); }
        }

        .number:active {
            transform: translate(-50%, -50%) scale(1.15);
            background: var(--active-bg);
        }

        .number.selected {
            color: var(--number-selected);
            font-weight: 600;
            z-index: 6;
        }

        .number.inner {
            font-size: 14px;
            color: var(--number-inner);
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            background: var(--ripple-bg);
            transform: scale(0);
            animation: rippleEffect 0.6s ease-out;
            pointer-events: none;
        }

        @keyframes rippleEffect {
            to { transform: scale(4); opacity: 0; }
        }

        .actions {
            background: var(--actions-bg);
            backdrop-filter: blur(20px);
            padding: 20px;
            padding-bottom: max(20px, env(safe-area-inset-bottom, 20px));
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--actions-border);
            flex-shrink: 0;
            gap: 20px;
            transition: all 0.5s ease;
        }

        .time-summary {
            font-size: 14px;
            color: var(--summary-muted);
            flex: 1;
            min-width: 0;
            transition: color 0.5s ease;
        }

        .time-summary span {
            color: var(--summary-active);
            font-weight: 500;
            transition: color 0.5s ease;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            flex-shrink: 0;
        }

        .btn {
            background: transparent;
            border: none;
            color: var(--btn-color);
            font-size: 14px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 12px 24px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .btn:active {
            background: var(--btn-active-bg);
            color: var(--btn-active-color);
        }

        .btn.primary {
            background: linear-gradient(135deg, var(--primary-start) 0%, var(--primary-end) 100%);
            color: white;
            box-shadow: var(--primary-shadow);
            border-radius: 12px;
        }

        .btn.primary:active {
            transform: translateY(-2px);
            box-shadow: var(--primary-active-shadow);
        }

        .error-toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--error-bg);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1000;
            transition: transform 0.3s;
            backdrop-filter: blur(10px);
        }

        .error-toast.show {
            transform: translateX(-50%) translateY(0);
        }

        @media (max-height: 700px) {
            .header { padding: 20px 15px 15px; }
            .time-context { font-size: 11px; margin-bottom: 5px; }
            .time-display { font-size: 36px; }
            .presets { padding: 10px 15px; }
            .preset-chip { padding: 6px 12px; font-size: 12px; }
            .clock-container { width: min(80vw, 260px); height: min(80vw, 260px); }
            .number { width: 34px; height: 34px; line-height: 34px; font-size: 14px; }
            .selection-circle { width: 40px; height: 40px; }
            .actions { padding: 15px; padding-bottom: max(15px, env(safe-area-inset-bottom, 15px)); }
        }

        @media (max-height: 600px) {
            .clock-container { width: min(75vw, 240px); height: min(75vw, 240px); }
            .number { width: 30px; height: 30px; line-height: 30px; font-size: 13px; }
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="error-toast" id="errorToast">Ошибка</div>

    <div class="header">
        <div class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Переключить тему">🌙</div>
        <div class="mode-badge" id="modeBadge">ВРЕМЯ НАЧАЛА</div>
        <div class="time-context" id="timeContext">Утро</div>
        <div class="time-display">
            <span class="time-unit active" id="hourDisplay" onclick="setMode('hour')">10</span>
            <span class="separator">:</span>
            <span class="time-unit" id="minuteDisplay" onclick="setMode('minute')">00</span>
        </div>
    </div>

    <div class="presets">
        <div class="preset-chip" onclick="setPreset(0, 0)">🌙 Полночь</div>
        <div class="preset-chip" onclick="setPreset(9, 0)">☀️ Утро</div>
        <div class="preset-chip" onclick="setPreset(12, 0)">🌤 День</div>
        <div class="preset-chip" onclick="setPreset(18, 0)">🌆 Вечер</div>
        <div class="preset-chip" onclick="setPresetNow()">⚡ Сейчас</div>
    </div>

    <div class="clock-section">
        <div class="clock-container">
            <div class="clock-face" id="clockFace">
                <div class="center-dot"></div>
                <div class="selection-circle" id="selectionCircle"></div>
                <div class="hand-line" id="handLine"></div>
            </div>
        </div>
    </div>

    <div class="actions">
        <div class="time-summary" id="timeSummary">Выбрано: <span>10:00</span></div>
        <div class="btn-group">
            <button class="btn" onclick="cancel()">Отмена</button>
            <button class="btn primary" onclick="confirmTime()">Подтвердить</button>
        </div>
    </div>

    <script>
        // === ИНИЦИАЛИЗАЦИЯ TELEGRAM WEBAPP ===
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        // === ПАРАМЕТРЫ URL ===
        const urlParams = new URLSearchParams(window.location.search);
        const botUsername = urlParams.get('bot');
        const timeMode = urlParams.get('mode') || 'start';

        // === ТЕМА ===
        let currentTheme = localStorage.getItem('timePickerTheme') || 'dark';

        function applyTheme(theme) {
            currentTheme = theme;
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('timePickerTheme', theme);
            const toggle = document.getElementById('themeToggle');
            toggle.textContent = theme === 'dark' ? '🌙' : '☀️';
            toggle.title = theme === 'dark' ? 'Включить светлую тему' : 'Включить тёмную тему';
        }

        function toggleTheme() {
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            applyTheme(newTheme);
            haptic('medium');
        }

        // Проверяем тему Telegram, если есть
        if (tg && tg.colorScheme) {
            applyTheme(tg.colorScheme);
        } else {
            applyTheme(currentTheme);
        }

        // Слушаем изменение темы в Telegram
        if (tg) {
            tg.onEvent('themeChanged', () => {
                if (tg.colorScheme) {
                    applyTheme(tg.colorScheme);
                }
            });
        }

        // === СОСТОЯНИЕ ===
        let mode = 'hour';
        let hour = 10;
        let minute = 0;
        let isDragging = false;
        const clockFace = document.getElementById('clockFace');
        let center = 150;

        // === ИНИЦИАЛИЗАЦИЯ ===
        function init() {
            const modeBadge = document.getElementById('modeBadge');
            if (timeMode === 'end') {
                modeBadge.textContent = 'ВРЕМЯ ОКОНЧАНИЯ';
                modeBadge.style.borderColor = '#4CAF50';
                modeBadge.style.color = '#4CAF50';
                modeBadge.style.background = 'rgba(76, 175, 80, 0.2)';
            }

            if (!botUsername && urlParams.get('embed') !== '1') {
                showError('Ошибка: бот не передан в URL');
                console.error('URL:', window.location.search);
            }

            setTimeout(() => {
                const rect = clockFace.getBoundingClientRect();
                center = rect.width / 2;
                renderNumbers();
                updateClock();
                updateContext();
            }, 100);
        }

        // === ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ===
        function getTimeContext(h) {
            if (h >= 5 && h < 12) return { text: 'Утро', icon: '☀️' };
            if (h >= 12 && h < 17) return { text: 'День', icon: '🌤' };
            if (h >= 17 && h < 22) return { text: 'Вечер', icon: '🌆' };
            return { text: 'Ночь', icon: '🌙' };
        }

        function updateContext() {
            const ctx = getTimeContext(hour);
            document.getElementById('timeContext').textContent = `${ctx.icon} ${ctx.text}`;
            document.getElementById('timeSummary').innerHTML = 
                `Выбрано: <span>${String(hour).padStart(2,'0')}:${String(minute).padStart(2,'0')}</span>`;
        }

        function haptic(type) {
            if (tg && tg.HapticFeedback) {
                try { tg.HapticFeedback.impactOccurred(type); } catch(e) {}
            }
        }

        function showError(msg) {
            const toast = document.getElementById('errorToast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // === РЕНДЕР ЦИФЕРБЛАТА ===
        function renderNumbers() {
            const oldNumbers = clockFace.querySelectorAll('.number');
            oldNumbers.forEach((n, i) => {
                n.style.animationDelay = `${i * 0.02}s`;
                n.style.animationDirection = 'reverse';
                setTimeout(() => n.remove(), 400);
            });

            setTimeout(() => {
                let delay = 0;

                if (mode === 'hour') {
                    const outerR = center * 0.78;
                    const innerR = center * 0.48;

                    for (let i = 1; i <= 12; i++) {
                        const angle = (i * 30 - 90) * Math.PI / 180;
                        const x = center + outerR * Math.cos(angle);
                        const y = center + outerR * Math.sin(angle);
                        clockFace.appendChild(createNumber(i, x, y, i, delay));
                        delay += 0.03;
                    }

                    for (let i = 0; i < 12; i++) {
                        const val = i === 0 ? 0 : i + 12;
                        const angle = (i * 30 - 90) * Math.PI / 180;
                        const x = center + innerR * Math.cos(angle);
                        const y = center + innerR * Math.sin(angle);
                        clockFace.appendChild(createNumber(String(val).padStart(2,'0'), x, y, val, delay, true));
                        delay += 0.03;
                    }
                } else {
                    const r = center * 0.78;
                    for (let i = 0; i < 12; i++) {
                        const val = i * 5;
                        const angle = (i * 30 - 90) * Math.PI / 180;
                        const x = center + r * Math.cos(angle);
                        const y = center + r * Math.sin(angle);
                        clockFace.appendChild(createNumber(String(val).padStart(2,'0'), x, y, val, i * 0.03));
                    }
                }
                setTimeout(updateClock, 100);
            }, oldNumbers.length > 0 ? 200 : 0);
        }

        function createNumber(text, x, y, value, delay, isInner = false) {
            const div = document.createElement('div');
            div.className = 'number' + (isInner ? ' inner' : '');
            div.style.left = x + 'px';
            div.style.top = y + 'px';
            div.style.animationDelay = `${delay}s`;
            div.textContent = text;
            div.dataset.value = value;

            div.addEventListener('pointerdown', (e) => {
                createRipple(e, div);
                setValue(value);
            });

            return div;
        }

        function createRipple(e, element) {
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            ripple.style.width = ripple.style.height = '40px';
            ripple.style.left = '50%';
            ripple.style.top = '50%';
            ripple.style.marginLeft = '-20px';
            ripple.style.marginTop = '-20px';
            element.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        }

        // === УПРАВЛЕНИЕ ЗНАЧЕНИЯМИ ===
        function setValue(val) {
            if (mode === 'hour') {
                hour = val;
                document.getElementById('hourDisplay').textContent = String(hour).padStart(2,'0');
                updateClock();
                updateContext();
                haptic('medium');
                setTimeout(() => setMode('minute'), 400);
            } else {
                minute = val;
                document.getElementById('minuteDisplay').textContent = String(minute).padStart(2,'0');
                updateClock();
                updateContext();
                haptic('medium');
            }
        }

        function setPreset(h, m) {
            hour = h;
            minute = m;
            document.getElementById('hourDisplay').textContent = String(hour).padStart(2,'0');
            document.getElementById('minuteDisplay').textContent = String(minute).padStart(2,'0');
            updateClock();
            updateContext();
            haptic('heavy');
            if (mode === 'hour') setMode('minute');
        }

        function setPresetNow() {
            const now = new Date();
            setPreset(now.getHours(), now.getMinutes());
        }

        function setMode(m) {
            if (mode === m) return;
            mode = m;
            document.getElementById('hourDisplay').classList.toggle('active', m === 'hour');
            document.getElementById('minuteDisplay').classList.toggle('active', m === 'minute');
            renderNumbers();
            haptic('light');
        }

        // === ОБНОВЛЕНИЕ СТРЕЛКИ И ВЫДЕЛЕНИЯ ===
        function updateClock() {
            const val = mode === 'hour' ? hour : minute;
            const r = mode === 'hour' 
                ? ((hour === 0 || hour > 12) ? center * 0.48 : center * 0.78) 
                : center * 0.78;

            let angle;
            if (mode === 'hour') {
                if (hour === 0) angle = -90;
                else if (hour <= 12) angle = (hour * 30) - 90;
                else angle = ((hour - 12) * 30) - 90;
            } else {
                angle = (minute * 6) - 90;
            }

            const rad = angle * Math.PI / 180;
            const x = center + r * Math.cos(rad);
            const y = center + r * Math.sin(rad);

            const circle = document.getElementById('selectionCircle');
            circle.style.left = x + 'px';
            circle.style.top = y + 'px';
            circle.style.animation = 'none';
            void circle.offsetWidth;
            circle.style.animation = 'popIn 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards';

            const line = document.getElementById('handLine');
            line.style.height = r + 'px';
            line.style.marginTop = -r + 'px';
            line.style.transform = `rotate(${angle + 90}deg)`;

            document.querySelectorAll('.number').forEach(n => {
                const nv = parseInt(n.dataset.value);
                const isSelected = nv === val;
                n.classList.toggle('selected', isSelected);
                if (isSelected) {
                    n.style.color = '';
                    n.style.transform = 'translate(-50%, -50%) scale(1.1)';
                } else if (n.classList.contains('inner')) {
                    n.style.color = '';
                    n.style.transform = 'translate(-50%, -50%) scale(1)';
                } else {
                    n.style.color = '';
                    n.style.transform = 'translate(-50%, -50%) scale(1)';
                }
            });
        }

        // === ПЕРЕТАСКИВАНИЕ ===
        clockFace.addEventListener('pointerdown', (e) => {
            isDragging = true;
            clockFace.setPointerCapture(e.pointerId);
            handleDrag(e);
        });

        function handleDrag(e) {
            if (!isDragging) return;
            e.preventDefault();

            const rect = clockFace.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;

            const x = e.clientX - cx;
            const y = e.clientY - cy;
            const dist = Math.sqrt(x * x + y * y);

            let angle = Math.atan2(y, x) * 180 / Math.PI + 90;
            if (angle < 0) angle += 360;

            if (mode === 'hour') {
                const pos = Math.round(angle / 30) % 12;
                const isInner = dist < center * 0.6;
                let newHour = isInner ? (pos === 0 ? 0 : pos + 12) : (pos === 0 ? 12 : pos);

                if (newHour !== hour) {
                    hour = newHour;
                    document.getElementById('hourDisplay').textContent = String(hour).padStart(2,'0');
                    updateClock();
                    updateContext();
                    haptic('selection');
                }
            } else {
                const newMin = Math.round(angle / 6) % 60;
                if (newMin !== minute) {
                    minute = newMin;
                    document.getElementById('minuteDisplay').textContent = String(minute).padStart(2,'0');
                    updateClock();
                    updateContext();
                    haptic('selection');
                }
            }
        }

        clockFace.addEventListener('pointermove', handleDrag);
        clockFace.addEventListener('pointerup', () => {
            if (isDragging && mode === 'hour') setTimeout(() => setMode('minute'), 300);
            isDragging = false;
        });
        clockFace.addEventListener('pointercancel', () => isDragging = false);

        // === ПОДТВЕРЖДЕНИЕ И ОТМЕНА ===
        function confirmTime() {
            const time = `${String(hour).padStart(2,'0')}:${String(minute).padStart(2,'0')}`;

            // === РЕЖИМ IFRAME (сайт) ===
            const params = new URLSearchParams(window.location.search);
            if (params.get('embed') === '1') {
                console.log('EMBED MODE: sending postMessage', time);
                if (window.parent !== window) {
                    window.parent.postMessage({type: 'time_picked', time: time}, '*');
                } else {
                    showError('Ошибка: режим embed вне iframe');
                }
                return;
            }

            // === РЕЖИМ TELEGRAM ===
            try { haptic('heavy'); } catch(e) {}

            if (!botUsername) {
                showError('Ошибка: не передан username бота');
                return;
            }

            const param = `sd_${hour}_${minute}_${timeMode}`;
            const deepLink = `https://t.me/${botUsername}?start=${param}`;

            console.log('TELEGRAM MODE: opening', deepLink);

            if (tg && tg.openTelegramLink) {
                tg.openTelegramLink(deepLink);
                setTimeout(() => {
                    try { tg.close(); } catch(e) {}
                }, 500);
            } else {
                window.location.href = deepLink;
            }
        }

        function cancel() {
            haptic('light');
            if (tg && tg.close) {
                try { tg.close(); } catch(e) {}
            }
        }

        // === РЕСАЙЗ ===
        window.addEventListener('resize', () => {
            const rect = clockFace.getBoundingClientRect();
            center = rect.width / 2;
            renderNumbers();
            updateClock();
        });

        // === СТАРТ ===
        init();
    </script>
</body>
</html>
