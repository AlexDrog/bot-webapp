<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Выбор времени</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        .header { text-align: center; margin: 20px 0; }
        .header h2 { font-size: 22px; margin-bottom: 6px; }
        
        .picker-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin: 30px 0;
            position: relative;
        }
        .picker {
            height: 180px;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            background: #16213e;
            border-radius: 16px;
            width: 80px;
            position: relative;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .picker::-webkit-scrollbar { display: none; }
        .picker-item {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            scroll-snap-align: center;
            opacity: 0.3;
            transition: all 0.2s;
        }
        .picker-item.active {
            opacity: 1;
            font-weight: bold;
            color: #e94560;
            font-size: 32px;
        }
        .separator {
            font-size: 32px;
            font-weight: bold;
            color: #e94560;
        }
        .center-line {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 60px;
            transform: translateY(-50%);
            border-top: 2px solid #e94560;
            border-bottom: 2px solid #e94560;
            pointer-events: none;
            opacity: 0.3;
        }
        
        .summary {
            text-align: center;
            margin: 20px 0;
            padding: 20px;
            background: rgba(233, 69, 96, 0.1);
            border-radius: 12px;
        }
        .summary .label { font-size: 12px; color: #888; margin-bottom: 8px; }
        .summary .time { font-size: 36px; font-weight: 200; }
        
        .btn {
            margin-top: auto;
            background: linear-gradient(135deg, #e94560 0%, #c73e54 100%);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(233, 69, 96, 0.4);
        }
        .btn:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="header">
        <h2>⏱ Выберите время</h2>
        <p style="color: #888; font-size: 14px;">Прокрутите колесики</p>
    </div>

    <div class="picker-container">
        <div class="center-line"></div>
        <div class="picker" id="hoursPicker"></div>
        <div class="separator">:</div>
        <div class="picker" id="minutesPicker"></div>
    </div>

    <div class="summary">
        <div class="label">Будет установлено</div>
        <div class="time" id="result">09:00</div>
    </div>

    <button class="btn" onclick="confirmTime()">✅ Подтвердить</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        const hoursPicker = document.getElementById('hoursPicker');
        const minutesPicker = document.getElementById('minutesPicker');
        const result = document.getElementById('result');
        
        let selectedHour = 9;
        let selectedMinute = 0;
        
        // Генерация элементов
        function generateItems(container, count, pad = true) {
            for (let i = 0; i < count; i++) {
                const div = document.createElement('div');
                div.className = 'picker-item';
                div.textContent = pad ? String(i).padStart(2, '0') : i;
                div.dataset.value = i;
                container.appendChild(div);
            }
            // Пустые элементы для центрирования
            container.insertBefore(document.createElement('div'), container.firstChild).style.height = '60px';
            container.appendChild(document.createElement('div')).style.height = '60px';
        }
        
        generateItems(hoursPicker, 24);
        generateItems(minutesPicker, 60);
        
        // Обработка скролла
        function handleScroll(container, type) {
            const items = container.querySelectorAll('.picker-item');
            const center = container.scrollTop + 90;
            
            items.forEach(item => {
                const itemCenter = item.offsetTop + 30;
                const diff = Math.abs(center - itemCenter);
                if (diff < 30) {
                    items.forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    const val = parseInt(item.dataset.value);
                    if (type === 'hours') selectedHour = val;
                    else selectedMinute = val;
                    updateResult();
                }
            });
        }
        
        function updateResult() {
            const time = `${String(selectedHour).padStart(2,'0')}:${String(selectedMinute).padStart(2,'0')}`;
            result.textContent = time;
            tg.HapticFeedback?.selectionChanged?.();
        }
        
        hoursPicker.addEventListener('scroll', () => handleScroll(hoursPicker, 'hours'));
        minutesPicker.addEventListener('scroll', () => handleScroll(minutesPicker, 'minutes'));
        
        // Инициализация
        setTimeout(() => {
            hoursPicker.scrollTop = 9 * 60; // 09:00
            minutesPicker.scrollTop = 0;
        }, 100);
        
        function confirmTime() {
            const timeValue = `${String(selectedHour).padStart(2,'0')}:${String(selectedMinute).padStart(2,'0')}`;
            tg.HapticFeedback?.impactOccurred?.('medium');
            tg.sendData(JSON.stringify({action: 'set_time', time: timeValue}));
            tg.close();
        }
    </script>
</body>
</html>
