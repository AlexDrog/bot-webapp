<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Выбор времени</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        h2 { margin-bottom: 30px; text-align: center; }
        .time-container {
            background: #16213e;
            padding: 30px;
            border-radius: 15px;
            width: 100%;
            max-width: 300px;
            text-align: center;
        }
        input[type="time"] {
            font-size: 32px;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: #0f3460;
            color: white;
            width: 100%;
            text-align: center;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        button {
            background: #e94560;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }
        button:active { background: #c73e54; }
        .hint {
            margin-top: 20px;
            font-size: 14px;
            color: #888;
            text-align: center;
        }
    </style>
</head>
<body>
    <h2>⏱ Выберите время</h2>
    <div class="time-container">
        <input type="time" id="timePicker" value="09:00">
        <button onclick="sendTime()">✅ Подтвердить</button>
    </div>
    <div class="hint">Время будет отправлено в бот автоматически</div>

    <script>
        // Инициализация WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // Установка текущего времени по умолчанию
        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        document.getElementById('timePicker').value = `${hours}:${minutes}`;
        
        function sendTime() {
            const timeValue = document.getElementById('timePicker').value;
            if (!timeValue) {
                tg.showAlert('Выберите время!');
                return;
            }
            
            // ОТПРАВКА ДАННЫХ В БОТ (важно!)
            tg.sendData(JSON.stringify({time: timeValue}));
            
            // Закрытие WebApp
            tg.close();
        }
        
        // Обработка Enter
        document.getElementById('timePicker').addEventListener('change', function(e) {
            if (e.target.value) {
                sendTime();
            }
        });
    </script>
</body>
</html>
