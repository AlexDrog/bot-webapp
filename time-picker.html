<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="telegram-web-app" content="yes">
    <title>Выбор времени</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #1a1a2e; 
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }
        
        h2 { 
            margin-bottom: 30px; 
            font-size: 22px; 
            text-align: center;
            font-weight: 500;
        }
        
        .time-container { 
            background: #16213e; 
            padding: 30px; 
            border-radius: 16px; 
            margin-bottom: 20px;
            width: 100%;
            max-width: 280px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        
        input[type="time"] { 
            font-size: 36px; 
            padding: 12px; 
            width: 100%;
            border: 2px solid #0f3460;
            border-radius: 12px;
            background: #0f3460;
            color: white;
            text-align: center;
            font-family: inherit;
            outline: none;
        }
        
        input[type="time"]:focus {
            border-color: #4CAF50;
        }
        
        .buttons {
            display: flex;
            gap: 12px;
            width: 100%;
            max-width: 280px;
        }
        
        button { 
            flex: 1;
            padding: 16px; 
            font-size: 17px; 
            border: none;
            border-radius: 10px; 
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        
        button:active { 
            opacity: 0.8;
            transform: scale(0.98);
        }
        
        .btn-ok { 
            background: #4CAF50; 
            color: white; 
        }
        
        .btn-cancel { 
            background: #f44336; 
            color: white; 
        }
        
        .hint { 
            margin-top: 25px; 
            color: #888; 
            font-size: 13px;
            text-align: center;
        }
        
        .debug {
            margin-top: 10px;
            font-size: 11px;
            color: #666;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <h2 id="title">Выберите время</h2>
    
    <div class="time-container">
        <input type="time" id="timepicker" step="300">
    </div>
    
    <div class="buttons">
        <button class="btn-cancel" onclick="closeApp()">Отмена</button>
        <button class="btn-ok" onclick="sendTime()">OK</button>
    </div>
    
    <div class="hint">Нажмите OK для подтверждения</div>
    <div class="debug" id="debug"></div>

    <script>
        // Отладка
        function log(msg) {
            console.log(msg);
            document.getElementById('debug').textContent += msg + '; ';
        }
        
        try {
            log('Init start');
            
            // Проверяем Telegram WebApp
            if (!window.Telegram || !window.Telegram.WebApp) {
                log('No Telegram WebApp');
                alert('Эта страница работает только в Telegram WebApp');
                throw new Error('No Telegram WebApp');
            }
            
            const tg = window.Telegram.WebApp;
            log('TG object ok');
            
            // Инициализация
            tg.ready();
            tg.expand();
            log('TG ready & expanded');
            
            // Получаем элементы
            const timeInput = document.getElementById('timepicker');
            const titleEl = document.getElementById('title');
            
            if (!timeInput) {
                log('No timeInput element');
                throw new Error('No timepicker element');
            }
            log('Elements found');
            
            // Читаем параметры URL
            const urlParams = new URLSearchParams(window.location.search);
            const mode = urlParams.get('mode') || 'start';
            log('Mode: ' + mode);
            
            // Устанавливаем время и заголовок
            let initialTime;
            if (mode === 'start') {
                initialTime = '09:00';
                titleEl.textContent = '🕐 Время НАЧАЛА работы';
            } else if (mode === 'end') {
                initialTime = '18:00';
                titleEl.textContent = '🕕 Время ОКОНЧАНИЯ работы';
            } else {
                // Текущее время
                const now = new Date();
                const h = String(now.getHours()).padStart(2, '0');
                const m = String(now.getMinutes()).padStart(2, '0');
                initialTime = `${h}:${m}`;
                titleEl.textContent = '⏱ Выберите время';
            }
            
            // Устанавливаем значение
            timeInput.value = initialTime;
            log('Time set: ' + initialTime);
            
            // Функция отправки
            window.sendTime = function() {
    const time = timeInput.value;
    log('Time selected: ' + time);
    
    if (!time) {
        alert('Выберите время!');
        return;
    }
    
    try {
        log('Sending data to Telegram...');
        tg.sendData(time);
        log('Data sent, closing...');
        tg.close();
    } catch (e) {
        log('ERROR: ' + e.message);
        alert('Ошибка: ' + e.message);
    }
};
            
            // Функция закрытия
            window.closeApp = function() {
                log('Close called');
                tg.close();
            };
            
            // Обработка Enter
            timeInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    sendTime();
                }
            });
            
            log('Init complete');
            
        } catch (error) {
            log('Fatal error: ' + error.message);
            console.error(error);
        }
    </script>
</body>
</html>
