<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #1a1a1a;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: none;
        }
        
        /* Шапка с временем */
        .header {
            background: #2481cc;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .time-display {
            font-size: 52px;
            font-weight: 300;
            letter-spacing: 3px;
        }
        .time-display span {
            cursor: pointer;
            padding: 0 5px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .time-display span.active {
            font-weight: bold;
            background: rgba(255,255,255,0.2);
        }
        .time-display span.inactive {
            opacity: 0.6;
        }
        
        /* Циферблат */
        .clock-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 20px;
        }
        #clock {
            width: 300px;
            height: 300px;
            position: relative;
            border-radius: 50%;
            background: #2d2d2d;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        
        /* Цифры на циферблате */
        .number {
            position: absolute;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 500;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }
        .number:hover { background: rgba(255,255,255,0.1); }
        .number.active { 
            background: #2481cc; 
            color: white;
            transform: scale(1.1);
        }
        
        /* Стрелка */
        .hand {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            background: #2481cc;
            transform-origin: bottom center;
            border-radius: 2px;
            pointer-events: none;
            z-index: 10;
        }
        .hand::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 20px;
            background: #2481cc;
            border-radius: 50%;
            border: 4px solid #1a1a1a;
        }
        
        /* Кнопки */
        .buttons {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            background: #1a1a1a;
            border-top: 1px solid #333;
            gap: 20px;
        }
        .btn {
            flex: 1;
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-cancel {
            background: #333;
            color: #aaa;
        }
        .btn-ok {
            background: #4CAF50;
            color: white;
        }
        .btn:active { transform: scale(0.95); }
        
        /* Подсказка */
        .hint {
            text-align: center;
            padding: 10px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="time-display" id="timeDisplay">
            <span id="hourSpan" class="active" onclick="setMode('hour')">09</span>:<span id="minuteSpan" class="inactive" onclick="setMode('minute')">00</span>
        </div>
    </div>
    
    <div class="hint" id="hint">Выберите часы</div>
    
    <div class="clock-container">
        <div id="clock">
            <div class="hand" id="hand" style="height: 100px; transform: translate(-50%, -100%) rotate(0deg);"></div>
        </div>
    </div>
    
    <div class="buttons">
        <button class="btn btn-cancel" onclick="cancel()">Отмена</button>
        <button class="btn btn-ok" onclick="confirm()">OK</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        let mode = 'hour'; // 'hour' или 'minute'
        let hour = 9;
        let minute = 0;
        const clock = document.getElementById('clock');
        const hand = document.getElementById('hand');
        
        // Генерация цифр
        function generateNumbers() {
            clock.innerHTML = '<div class="hand" id="hand" style="height: 100px; transform: translate(-50%, -100%) rotate(0deg);"></div>';
            
            const radius = 110;
            const count = mode === 'hour' ? 12 : 12; // 12 позиций (для минут каждые 5)
            
            for(let i = 0; i < count; i++) {
                const num = mode === 'hour' ? (i === 0 ? 12 : i) : (i * 5);
                const angle = i * 30; // 360 / 12
                
                const x = 150 + radius * Math.sin(angle * Math.PI / 180);
                const y = 150 - radius * Math.cos(angle * Math.PI / 180);
                
                const div = document.createElement('div');
                div.className = 'number';
                div.textContent = mode === 'hour' ? num : String(num).padStart(2, '0');
                div.style.left = (x - 25) + 'px';
                div.style.top = (y - 25) + 'px';
                
                if(mode === 'hour' && num === hour) div.classList.add('active');
                if(mode === 'minute' && num === minute) div.classList.add('active');
                
                div.onclick = () => selectValue(num);
                clock.appendChild(div);
            }
            
            updateHand();
        }
        
        function updateHand() {
            const value = mode === 'hour' ? hour : (minute / 5);
            const angle = value * 30;
            hand.style.transform = `translate(-50%, -100%) rotate(${angle}deg)`;
        }
        
        function selectValue(val) {
            if(mode === 'hour') {
                hour = val;
                document.getElementById('hourSpan').textContent = String(hour).padStart(2, '0');
                // Автопереход на минуты
                setTimeout(() => setMode('minute'), 200);
            } else {
                minute = val;
                document.getElementById('minuteSpan').textContent = String(minute).padStart(2, '0');
            }
            generateNumbers();
        }
        
        function setMode(newMode) {
            mode = newMode;
            document.getElementById('hourSpan').className = mode === 'hour' ? 'active' : 'inactive';
            document.getElementById('minuteSpan').className = mode === 'minute' ? 'active' : 'inactive';
            document.getElementById('hint').textContent = mode === 'hour' ? 'Выберите часы' : 'Выберите минуты';
            generateNumbers();
        }
        
        // Touch/drag поддержка
        let isDragging = false;
        clock.addEventListener('touchstart', handleInput);
        clock.addEventListener('touchmove', handleInput);
        clock.addEventListener('mousedown', () => isDragging = true);
        clock.addEventListener('mousemove', (e) => { if(isDragging) handleInput(e); });
        clock.addEventListener('mouseup', () => isDragging = false);
        
        function handleInput(e) {
            e.preventDefault();
            const rect = clock.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            const x = clientX - centerX;
            const y = clientY - centerY;
            
            let angle = Math.atan2(x, -y) * 180 / Math.PI;
            if(angle < 0) angle += 360;
            
            const index = Math.round(angle / 30) % 12;
            const value = mode === 'hour' ? (index === 0 ? 12 : index) : (index * 5);
            
            selectValue(value);
        }
        
        function confirm() {
            const timeStr = `${String(hour).padStart(2,'0')}:${String(minute).padStart(2,'0')}`;
            tg.sendData(JSON.stringify({
                type: 'time',
                time: timeStr,
                hour: hour,
                minute: minute
            }));
            tg.close();
        }
        
        function cancel() {
            tg.close();
        }
        
        generateNumbers();
    </script>
</body>
</html>
