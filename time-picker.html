<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Выбор времени</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e; 
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        h2 { margin-bottom: 30px; font-size: 24px; }
        .time-container { 
            background: #16213e; 
            padding: 30px; 
            border-radius: 15px; 
            margin-bottom: 20px;
            width: 100%;
            max-width: 300px;
        }
        input[type="time"] { 
            font-size: 32px; 
            padding: 15px; 
            width: 100%;
            border: none;
            border-radius: 10px;
            background: #0f3460;
            color: white;
            text-align: center;
        }
        .buttons {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 300px;
        }
        button { 
            flex: 1;
            padding: 15px 20px; 
            font-size: 18px; 
            border: none;
            border-radius: 10px; 
            cursor: pointer;
            font-weight: bold;
        }
        .btn-ok { background: #4CAF50; color: white; }
        .btn-ok:active { background: #45a049; }
        .btn-cancel { background: #f44336; color: white; }
        .btn-cancel:active { background: #da190b; }
        .hint { margin-top: 20px; color: #888; font-size: 14px; }
    </style>
</head>
<body>
    <h2 id="title">Выберите время</h2>
    
    <div class="time-container">
        <input type="time" id="timepicker" value="09:00">
    </div>
    
    <div class="buttons">
        <button class="btn-ok" onclick="sendTime()">✅ OK</button>
        <button class="btn-cancel" onclick="closeApp()">❌ Отмена</button>
    </div>
    
    <div class="hint">Нажмите OK чтобы подтвердить</div>

    <script>
        // Инициализация WebApp
        let tg = window.Telegram.WebApp;
        tg.ready();  // Обязательно!
        tg.expand(); // Раскрыть на весь экран
        
        // Читаем параметры из URL
        const params = new URLSearchParams(window.location.search);
        const mode = params.get('mode') || 'start';
        
        // Устанавливаем начальное время в зависимости от режима
        const timeInput = document.getElementById('timepicker');
        const title = document.getElementById('title');
        
        if (mode === 'start') {
            timeInput.value = '09:00';
            title.textContent = '🕐 Время НАЧАЛА работы';
        } else {
            timeInput.value = '18:00';
            title.textContent = '🕕 Время ОКОНЧАНИЯ работы';
        }
        
        // Функция отправки времени
        function sendTime() {
            const time = timeInput.value;
            if (!time) {
                alert('Выберите время!');
                return;
            }
            
            // Отправляем данные в бот
            tg.sendData(time);
            
            // Показываем уведомление (опционально)
            tg.showAlert('Время установлено: ' + time);
            
            // Закрываем WebApp
            tg.close();
        }
        
        // Функция закрытия без отправки
        function closeApp() {
            tg.close();
        }
        
        // Обработка Enter
        timeInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendTime();
        });
    </script>
</body>
</html>
